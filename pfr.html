<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PFR Builder — The Standard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--panel:#fff;--panel2:#fbfbfd;--ink:#1d1d1f;--ink2:#6e6e73;--ink3:#8e8e93;
  --line:#ececf0;--line2:#e3e3e8;--accent:#5b6cff;--accent2:#4f46e5;--accent-soft:rgba(91,108,255,.10);
  --green:#34c759;--green-soft:rgba(52,199,89,.12);--gold:#c99a2e;--gold-soft:rgba(201,154,46,.14);
  --red:#ff3b30;--red-soft:rgba(255,59,48,.10);--orange:#ff9f0a;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);--shadow:0 2px 8px rgba(0,0,0,.05),0 14px 40px rgba(0,0,0,.07);
  --shadow-lg:0 24px 60px rgba(0,0,0,.16);--font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
}
[data-theme="dark"]{--bg:#0a0a0c;--panel:#161618;--panel2:#1c1c1f;--ink:#f5f5f7;--ink2:#a1a1a8;--ink3:#77777e;--line:#26262a;--line2:#2e2e33;--accent:#7c8bff;--accent-soft:rgba(124,139,255,.14);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
.hide{display:none!important;}
.side{position:fixed;left:0;top:0;height:100vh;width:248px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:3px;padding:16px 12px;z-index:50;overflow-y:auto;}
.side .brand{padding:6px 8px 14px;}
.side .brand img{width:32px;height:32px;border-radius:9px;}
.slink{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;color:var(--ink2);font-weight:600;font-size:14px;white-space:nowrap;}
.slink svg{width:20px;height:20px;flex:0 0 auto;}
.slink:hover{background:var(--bg);color:var(--ink);}.slink.on{background:var(--accent-soft);color:var(--accent);}
.sfoot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line);}
body{padding-left:248px;}
@media(max-width:860px){body{padding-left:0;}.side{transform:translateX(-100%);}}
a{color:inherit;text-decoration:none;}
/* top bar */
.top{position:sticky;top:0;z-index:40;height:58px;display:flex;align-items:center;gap:14px;padding:0 22px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;}
.brand img{width:30px;height:30px;border-radius:8px;object-fit:cover;}
.brand b{color:var(--accent);}
.tlink{margin-left:auto;color:var(--ink2);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);}
.tlink:hover{color:var(--ink);}
/* gallery */
.wrap{max-width:1180px;margin:0 auto;padding:30px 26px 60px;}
.gh{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
h1.pgh{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:0 0 5px;}
.pgsub{color:var(--ink2);font-size:15px;margin:0;}
.newbtn{border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;padding:13px 20px;border-radius:13px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 20px var(--accent-soft);}
.newbtn:hover{background:var(--accent2);}
.srch{display:flex;align-items:center;gap:9px;padding:12px 15px;border:1px solid var(--line2);border-radius:14px;background:var(--panel);margin-bottom:22px;box-shadow:var(--shadow-sm);}
.srch input{border:none;background:none;outline:none;color:var(--ink);font-size:14.5px;width:100%;}
.srch svg{width:17px;height:17px;color:var(--ink3);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.16s;position:relative;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.card .ch{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.card .cav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex:0 0 auto;}
.card .cn{font-weight:800;font-size:15.5px;}.card .cp{font-size:12.5px;color:var(--ink3);}
.card .cneed{font-size:26px;font-weight:800;color:var(--accent);letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.card .cl{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-top:2px;}
.card .cfoot{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;color:var(--ink3);display:flex;justify-content:space-between;align-items:center;}
.cmenu{position:absolute;top:14px;right:14px;color:var(--ink3);border:none;background:none;font-size:18px;padding:2px 6px;border-radius:8px;line-height:1;}
.cmenu:hover{background:var(--bg);color:var(--ink);}
.pop{position:absolute;top:40px;right:14px;background:var(--panel);border:1px solid var(--line2);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;z-index:20;min-width:150px;}
.pop button{display:block;width:100%;text-align:left;border:none;background:none;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink);}
.pop button:hover{background:var(--bg);}.pop button.del{color:var(--red);}
.empty{text-align:center;padding:70px 20px;color:var(--ink3);}
.empty svg{width:46px;height:46px;margin-bottom:14px;opacity:.5;}
/* status badge */
.badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:999px;}
.badge.draft{background:var(--gold-soft);color:var(--gold);}
.badge.complete{background:var(--green-soft);color:#1a9c52;}
/* ===== FLOW (guided) ===== */
.flow{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;}
.fprog{height:4px;background:var(--line);}
.fprog .bar{height:100%;background:linear-gradient(90deg,var(--accent),#8b9bff);width:0;transition:width .4s cubic-bezier(.2,.8,.2,1);}
.ftop{display:flex;align-items:center;gap:14px;padding:16px 24px;}
.ftop .step{font-size:12.5px;font-weight:700;color:var(--ink3);}
.ftop .fx{margin-left:10px;border:1px solid var(--line2);background:var(--panel);border-radius:10px;padding:8px 13px;font-weight:600;font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:7px;}
.fsave{font-size:12px;color:var(--ink3);font-weight:600;margin-left:auto;white-space:nowrap;}
.fsave.dirty{color:var(--gold,#c99a2e);}
.fsave.saved{color:var(--green,#34c759);}
.ftop .fsavebtn{margin-left:12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:10px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:.12s;}
.ftop .fsavebtn:hover{filter:brightness(1.06);}
.fbody{flex:1;overflow-y:auto;display:flex;justify-content:center;}
.fstage{width:100%;max-width:720px;padding:24px 24px 40px;animation:fade .45s cubic-bezier(.2,.8,.2,1);}
@keyframes fade{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.eyebrow{font-size:12.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.qh{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.12;margin:0 0 12px;}
.qsub{font-size:16px;color:var(--ink2);line-height:1.5;margin:0 0 28px;max-width:560px;}
.fnav{display:flex;align-items:center;gap:12px;padding:18px 24px;border-top:1px solid var(--line);background:var(--panel);}
.fnav .back{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);font-weight:600;font-size:14.5px;padding:13px 20px;border-radius:13px;}
.fnav .next{margin-left:auto;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px 30px;border-radius:13px;box-shadow:0 8px 20px var(--accent-soft);display:inline-flex;align-items:center;gap:8px;}
.fnav .next:hover{background:var(--accent2);}
.fnav .next:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}
/* big number stepper */
.stepper{display:flex;align-items:center;justify-content:center;gap:26px;margin:10px 0 22px;}
.stepper button{width:56px;height:56px;border-radius:50%;border:1px solid var(--line2);background:var(--panel);font-size:26px;color:var(--ink);box-shadow:var(--shadow-sm);}
.stepper button:hover{background:var(--bg);}
.stepper .val{font-size:72px;font-weight:800;letter-spacing:-.04em;min-width:150px;text-align:center;font-variant-numeric:tabular-nums;}
.stepper .val small{font-size:20px;font-weight:600;color:var(--ink3);}
input[type=range]{width:100%;accent-color:var(--accent);height:6px;}
/* timeline */
.timeline{margin:26px 0 6px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);}
.tlbar{position:relative;height:8px;background:var(--line);border-radius:5px;margin:34px 0 26px;}
.tlbar .seg{position:absolute;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),#8b9bff);}
.tlbar .pin{position:absolute;top:-32px;transform:translateX(-50%);text-align:center;}
.tlbar .pin .dot{width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid var(--panel);box-shadow:var(--shadow-sm);margin:0 auto;position:absolute;top:28px;left:50%;transform:translateX(-50%);}
.tlbar .pin.worst .dot{background:var(--orange);}
.tlbar .pin b{font-size:15px;}.tlbar .pin span{display:block;font-size:10.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
/* comparison cards */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:8px 0 6px;}
.cmpc{border:1px solid var(--line);border-radius:16px;padding:20px;background:var(--panel);box-shadow:var(--shadow-sm);}
.cmpc.best{border-color:rgba(91,108,255,.4);}
.cmpc .cl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);}
.cmpc .cv{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-top:6px;font-variant-numeric:tabular-nums;}
.cmpc.best .cv{color:var(--accent);}
.fieldbig{border:1px solid var(--line2);border-radius:14px;background:var(--panel);display:flex;align-items:center;padding:6px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.fieldbig .cur{font-size:26px;font-weight:700;color:var(--ink3);}
.fieldbig input{border:none;background:none;outline:none;font-size:30px;font-weight:800;width:100%;color:var(--ink);padding:12px 6px;letter-spacing:-.02em;}
.fieldbig .per{font-size:14px;color:var(--ink3);font-weight:600;white-space:nowrap;}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:11px;margin:6px 0;}
.chip{border:1px solid var(--line2);background:var(--panel);border-radius:14px;padding:14px 18px;font-weight:600;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:9px;transition:.14s;box-shadow:var(--shadow-sm);}
.chip:hover{border-color:var(--accent);}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 8px 18px var(--accent-soft);}
.chip .emo{font-size:18px;}
/* faces */
.faces{display:flex;justify-content:space-between;gap:8px;margin:10px 0 6px;flex-wrap:wrap;}
.face{flex:1;min-width:110px;border:1px solid var(--line2);background:var(--panel);border-radius:16px;padding:18px 10px;text-align:center;transition:.16s;box-shadow:var(--shadow-sm);}
.face:hover{transform:translateY(-2px);border-color:var(--accent);}
.face.on{background:var(--accent-soft);border-color:var(--accent);}
.face .e{font-size:40px;line-height:1;}
.face .t{font-size:12px;font-weight:700;color:var(--ink2);margin-top:9px;}
.face.on .t{color:var(--accent);}
/* grouped money inputs */
.mgroup{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:16px;}
.mgroup .gh2{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--line);font-weight:800;font-size:14px;}
.mgroup .gh2 .gt{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent);}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;border-bottom:1px solid var(--line);}
.mrow:last-child{border-bottom:none;}
.mrow label{font-size:13.5px;color:var(--ink2);font-weight:500;}
.mrow .inp{display:flex;align-items:center;gap:2px;}
.mrow .inp .c{color:var(--ink3);font-size:13px;}
.mrow input{border:none;background:none;outline:none;text-align:right;width:110px;font-size:14.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;padding:6px 2px;border-bottom:1px solid transparent;}
.mrow input:focus{border-bottom-color:var(--accent);}
.mrow .mnum{border:none;background:none;outline:none;text-align:right;width:150px;font-size:15px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;padding:9px 2px;border-bottom:1px solid transparent;letter-spacing:-.01em;}
.mrow .mnum:focus{border-bottom-color:var(--accent);}
.mrow .mnum::placeholder{color:var(--ink3);font-weight:500;}
.mrow label{flex:1;padding-right:14px;}
.mrow .delitem{flex:0 0 auto;margin-left:10px;width:22px;height:22px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink3);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;}
.mrow .delitem:hover{border-color:var(--red);color:var(--red);background:#fff;}
.mrow.custom label{color:var(--accent);font-weight:600;}
.additem{display:flex;align-items:center;gap:6px;width:100%;padding:11px 18px;border:none;border-top:1px dashed var(--line2);background:var(--panel2);color:var(--accent);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;transition:.12s;}
.additem:hover{background:var(--accent-soft,rgba(91,108,255,.08));}
.additem b{font-size:16px;line-height:1;}
.wform{display:flex;flex-direction:column;gap:16px;max-width:470px;}
.wfield label{display:block;font-size:12.5px;font-weight:700;color:var(--ink3);margin-bottom:7px;letter-spacing:.01em;}
.wfield input{width:100%;border:1px solid var(--line2);background:var(--panel);border-radius:13px;padding:15px 16px;font-size:15.5px;color:var(--ink);outline:none;box-shadow:var(--shadow-sm);}
.wfield input:focus{border-color:var(--accent);}
.pbstep{display:flex;gap:13px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line);}
.pbstep:last-child{border-bottom:none;}
.pbstep .n{width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.pbstep .t{font-size:14px;line-height:1.5;}
.pbstep .t b{color:var(--ink);}
.pbrec{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line2);border-radius:13px;margin-bottom:10px;background:var(--panel2);}
.pbrec .pri{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);}
.pbrec .sol{font-weight:700;font-size:14.5px;margin:2px 0 3px;}
.pbrec .wy{font-size:13px;color:var(--ink2);line-height:1.45;}
.aibtn{border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:13.5px;padding:11px 16px;border-radius:12px;display:inline-flex;gap:7px;align-items:center;}
#aiBox{white-space:pre-wrap;font-size:14px;line-height:1.55;color:var(--ink);margin-top:12px;}
/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 8px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm);}
.stat .l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);}
.stat .v{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums;}
.stat.good .v{color:#1a9c52;}.stat.bad .v{color:var(--red);}.stat.accent .v{color:var(--accent);}
/* bar viz */
.barviz{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow-sm);margin:8px 0;}
.brow{margin-bottom:16px;}
.brow:last-child{margin-bottom:0;}
.brow .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:7px;}
.brow .bl b{font-variant-numeric:tabular-nums;}
.btrack{height:14px;border-radius:8px;background:var(--bg);overflow:hidden;}
.bfill{height:100%;border-radius:8px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
/* priorities drag */
.plist{display:flex;flex-direction:column;gap:10px;margin:6px 0;}
.pitem{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:15px 18px;box-shadow:var(--shadow-sm);cursor:grab;transition:.12s;}
.pitem.dragging{opacity:.4;}
.pitem .rank{width:28px;height:28px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;}
.pitem .pn{font-weight:700;font-size:15px;}
.pitem .grip{margin-left:auto;color:var(--ink3);font-size:18px;}
/* summary / report */
.rep{max-width:900px;margin:0 auto;padding:30px 26px 70px;}
.rephdr{text-align:center;margin-bottom:26px;}
.rephdr .rk{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}
.rephdr h1{font-size:32px;font-weight:800;letter-spacing:-.03em;margin:8px 0 4px;}
.rephdr .rs{color:var(--ink2);}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:var(--shadow-sm);margin-bottom:18px;}
.sec h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin:0 0 16px;}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;}
.kv .l{font-size:12px;color:var(--ink3);font-weight:600;}
.kv .v{font-size:22px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line2);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;margin:4px 6px 0 0;}
.repbtns{display:flex;gap:12px;justify-content:center;margin:24px 0 10px;flex-wrap:wrap;}
.repbtns button{border:1px solid var(--line2);background:var(--panel);color:var(--ink);font-weight:700;font-size:14px;padding:13px 22px;border-radius:13px;box-shadow:var(--shadow-sm);}
.repbtns .prime{background:var(--accent);color:#fff;border-color:var(--accent);}
.obs{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);}
.obs:last-child{border-bottom:none;}
.obs .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:14px;}
.obs.pos .ic{background:var(--green-soft);}.obs.neg .ic{background:var(--red-soft);}.obs.neu .ic{background:var(--accent-soft);}
.obs .ot{font-size:14px;line-height:1.45;}
/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:var(--shadow-lg);}
.toast.on{opacity:1;transform:translateX(-50%);}
@media(max-width:640px){.cmp{grid-template-columns:1fr;}.qh{font-size:24px;}.stepper .val{font-size:56px;}}
/* producer notes */
.ftop .fnotes{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);border-radius:10px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;}
.ftop .fnotes:hover{border-color:var(--gold);color:var(--gold);}
.ftop .fnotes .nb{background:var(--gold);color:#1a1400;border-radius:999px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:2px;}
.nov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:60px 16px;}
.nov.on{display:flex;}
.npanel{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.npanel h3{margin:0;padding:20px 22px 4px;font-size:19px;font-weight:800;letter-spacing:-.02em;}
.npanel .nsub{padding:0 22px 14px;color:var(--ink3);font-size:12.5px;}
.npanel .nlist{overflow-y:auto;padding:0 22px;flex:1;}
.nitem{border-left:3px solid var(--gold);background:var(--panel2);border-radius:0 10px 10px 0;padding:10px 12px;margin:0 0 9px;}
.nitem .nt{font-size:13.5px;color:var(--ink);white-space:pre-wrap;line-height:1.4;}
.nitem .nmeta{font-size:11px;color:var(--ink3);margin-top:5px;display:flex;gap:8px;align-items:center;}
.nitem .ndel{margin-left:auto;color:var(--red);cursor:pointer;border:none;background:none;font-size:12px;font-weight:600;}
.nempty{color:var(--ink3);font-size:13px;font-style:italic;padding:8px 0 14px;}
.nadd{border-top:1px solid var(--line);padding:14px 22px;display:flex;flex-direction:column;gap:10px;}
.nadd textarea{border:1px solid var(--line2);border-radius:12px;padding:12px;font-family:inherit;font-size:14px;resize:vertical;min-height:66px;background:var(--panel2);color:var(--ink);}
.nadd .nrow{display:flex;gap:10px;justify-content:flex-end;}
.nadd button{border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);}
.nadd button.nsave{background:var(--gold);border-color:var(--gold);color:#1a1400;}
/* internal notes block on report */
.internal{border:1px dashed var(--gold)!important;background:var(--gold-soft)!important;}
.internal .lock{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);margin-bottom:8px;}
/* AI discovery script */
.aiscript{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:var(--panel2);padding:16px 18px;}
.aiscript h4{margin:0 0 4px;font-size:14px;font-weight:800;}
.aiscript .seg{margin:12px 0 0;}
.aiscript .seglbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);margin-bottom:3px;}
.aiscript .segtx{font-size:13.5px;line-height:1.5;color:var(--ink);white-space:pre-wrap;}
.aiscript .aitools{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.aiscript .aitools button{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);border-radius:9px;padding:7px 13px;font-weight:700;font-size:12.5px;cursor:pointer;}
.aiscript .aitools button:hover{border-color:var(--accent);color:var(--accent);}
.aiscript .aitag{font-size:11px;color:var(--ink3);align-self:center;}
/* PRINT */
@media print{
  .top,.fnav,.ftop,.fprog,.repbtns,.tlink,.noprint{display:none!important;}
  body{background:#fff;}
  .sec{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
  .rep{padding:0;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<aside class="side" id="side"></aside>

<!-- GALLERY -->
<div class="wrap" id="gallery">
  <div class="gh">
    <div><h1 class="pgh">PFR Builder</h1><p class="pgsub">Personal Financial Reviews — build, review, and export for your clients.</p></div>
    <button class="newbtn" onclick="startNew()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> New PFR</button>
  </div>
  <div class="srch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="gq" placeholder="Search by client name or note…" oninput="renderGallery()"></div>
  <div class="cards" id="cards"></div>
</div>

<!-- FLOW -->
<div class="flow hide" id="flow">
  <div class="fprog"><div class="bar" id="progbar"></div></div>
  <div class="ftop">
    <span class="step" id="stepLbl">Step 1</span>
    <span class="fsave" id="saveLbl"></span>
    <button class="fnotes" id="notesBtnTop" onclick="openNotes()">🔒 Notes<span class="nb" id="notesCount" style="display:none">0</span></button>
    <button class="fsavebtn" id="saveBtnTop" onclick="saveManual()">Save</button>
    <button class="fx" onclick="exitFlow()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg> Save &amp; Close</button>
  </div>
  <div class="fbody" id="fbody"><div class="fstage" id="stage"></div></div>
  <div class="fnav">
    <button class="back" id="backBtn" onclick="prevStep()">Back</button>
    <button class="next" id="nextBtn" onclick="nextStep()">Continue</button>
  </div>
</div>

<!-- PRODUCER NOTES -->
<div class="nov" id="nov" onclick="if(event.target===this)closeNotes()">
  <div class="npanel">
    <h3>🔒 Internal Notes</h3>
    <div class="nsub">Producer-only — saved to this client's PFR, never shown to the client or on the PDF.</div>
    <div class="nlist" id="nlist"></div>
    <div class="nadd">
      <textarea id="nnew" placeholder="Add a note — carrier quirks, underwriting flags, follow-up reminders, family details…"></textarea>
      <div class="nrow"><button onclick="closeNotes()">Close</button><button class="nsave" onclick="addNote()">Add note</button></div>
    </div>
  </div>
</div>

<!-- SUMMARY / REPORT -->
<div class="rep hide" id="summary"></div>

<div class="toast" id="toast"></div>

<script>
var API="https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/pfr-api";
var CODE=null,NAME="",OPS=false,PFRS=[],CUR=null,STEP=0,saveTimer=null,AGENT={};
function $(id){return document.getElementById(id);}
function toast(t){var e=$('toast');e.textContent=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('on');},2200);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){n=Math.round(Number(n)||0);return '$'+n.toLocaleString('en-US');}
function initials(nm){nm=(nm||'').trim();if(!nm)return '?';var p=nm.split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}
function api(p){return fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(function(r){return r.json();});}
var AVCOL=['#5b6cff','#34c759','#ff9f0a','#af52de','#ff2d55','#0a84ff','#c99a2e','#30b0c7'];
function avColor(s){var h=0;s=s||'';for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return AVCOL[Math.abs(h)%AVCOL.length];}

/* theme follow */
try{var th=localStorage.getItem('gfi_theme');if(th==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}

var NAVI=[['home','Home','index.html','M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z'],
['hub','Team Hub','teamhub.html','M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z'],
['calendar','Scheduler','calendar.html','M3 4.5h18v16H3zM3 9h18M8 3v3M16 3v3'],
['dollar','New Business','newbusiness.html','M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'],
['pfr','PFR Builder','pfr.html','M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2M9 12h6M9 16h6M9 8h6'],
['check','My Tracker','checklist.html','M20 6 9 17l-5-5'],
['users','Leads','marketing.html','M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'],
['team','My Team','team.html','M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z'],
['tree','Org Chart','org.html','M9 3h6v5H9zM3 16h6v5H3zM15 16h6v5h-6zM12 8v4M6 16v-2h12v2'],
['book','Resources','resources.html','M4 5a2 2 0 0 1 2-2h13v18H6a2 2 0 0 1-2-2zM9 3v18'],
['chart','Ops Dashboard','dashboard.html','M3 3v18h18M7 13v4M12 8v9M17 11v6']];
function buildSide(){var h='<a class="brand" href="index.html"><img src="logo.png" onerror="this.style.display=\'none\'"><span>The <b>Standard</b></span></a>';
 NAVI.forEach(function(n){var on=n[2]==='pfr.html'?' on':'';h+='<a class="slink'+on+'" href="'+n[2]+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="'+n[3]+'"/></svg><span>'+n[1]+'</span></a>';});
 h+='<div class="sfoot"><a class="slink" href="#" onclick="signOut();return false;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><span>Sign out</span></a></div>';
 var el=document.getElementById('side');if(el)el.innerHTML=h;}
function signOut(){try{localStorage.removeItem('tsfg_code');localStorage.removeItem('tsfg_name');}catch(e){}location.href='index.html';}
/* ===== auth ===== */
(function(){
  try{CODE=localStorage.getItem('tsfg_code');NAME=localStorage.getItem('tsfg_name')||'';}catch(e){}
  if(!CODE){location.href='index.html';return;}
  CODE=CODE.toUpperCase();
  try{OPS=(localStorage.getItem('tsfg_ops')==='1');}catch(e){}
  buildSide();loadPFRs();
  fetch('https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/hub-api?action=hub_profile&code='+encodeURIComponent(CODE)).then(function(r){return r.json();}).then(function(r){var pf=(r&&r.profile)||{};AGENT={name:pf.name||NAME,email:pf.email||'',phone:pf.phone||'',cal:pf.cal_link||''};}).catch(function(){AGENT={name:NAME};});
})();

/* ===== gallery ===== */
function loadPFRs(){
  var p={action:'pfr_list',code:CODE};if(OPS)p.token='2026';
  api(p).then(function(r){PFRS=(r&&r.pfrs)||[];renderGallery();});
}
function pfrNotesArr(x){try{return (x.data&&x.data.producerNotes)||[];}catch(e){return [];}}
function pfrNotesText(x){return pfrNotesArr(x).map(function(n){return n&&n.t||'';}).join(' ').toLowerCase();}
function pfrNoteCount(x){return pfrNotesArr(x).length;}
function renderGallery(){
  var q=($('gq').value||'').toLowerCase();
  var list=PFRS.filter(function(x){return !q||((x.client_name||'').toLowerCase().indexOf(q)>=0)||(pfrNotesText(x).indexOf(q)>=0);});
  if(!list.length){
    $('cards').innerHTML='<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 12h6M9 16h6M9 8h6"/><rect x="4" y="3" width="16" height="18" rx="2.5"/></svg><div style="font-weight:700;color:var(--ink2);font-size:16px">No reviews yet</div><div style="margin-top:6px">Click <b>New PFR</b> to build your first Personal Financial Review.</div></div>';
    return;
  }
  $('cards').innerHTML=list.map(function(x){
    var nm=x.client_name||'Untitled Client';var col=avColor(nm);
    var st=x.status==='complete'?'complete':'draft';
    return '<div class="card" onclick="openPFR(\''+x.id+'\')">'+
      '<button class="cmenu" onclick="event.stopPropagation();togglePop(\''+x.id+'\')">&#8942;</button>'+
      '<div class="pop hide" id="pop_'+x.id+'" onclick="event.stopPropagation()">'+
        '<button onclick="openPFR(\''+x.id+'\')">Open / Edit</button>'+
        '<button onclick="openPFR(\''+x.id+'\',true)">View Report</button>'+
        '<button class="del" onclick="delPFR(\''+x.id+'\')">Delete</button>'+
      '</div>'+
      '<div class="ch"><div class="cav" style="background:'+col+'">'+esc(initials(nm)).toUpperCase()+'</div><div><div class="cn">'+esc(nm)+'</div><div class="cp">'+esc(x.client_phone||'')+'</div></div></div>'+
      '<div class="cneed">'+money(x.insurable_need)+'</div><div class="cl">Insurable Need</div>'+
      '<div class="cfoot"><span>Updated '+fmtDate(x.updated_at)+(pfrNoteCount(x)?(' · 🔒 '+pfrNoteCount(x)+' note'+(pfrNoteCount(x)>1?'s':'')):'')+'</span><span class="badge '+st+'">'+st+'</span></div>'+
    '</div>';
  }).join('');
}
function togglePop(id){var p=$('pop_'+id);document.querySelectorAll('.pop').forEach(function(x){if(x!==p)x.classList.add('hide');});p.classList.toggle('hide');}
document.addEventListener('click',function(){document.querySelectorAll('.pop').forEach(function(x){x.classList.add('hide');});});
function fmtDate(s){if(!s)return '';try{return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return '';}}
function delPFR(id){if(!confirm('Delete this PFR? This cannot be undone.'))return;var p={action:'pfr_delete',id:id,code:CODE};if(OPS)p.token='2026';api(p).then(function(){toast('Deleted');loadPFRs();});}

/* ===== data model ===== */
function blank(){return {client:{name:'',phone:'',email:''},
  retire:{best:60,worst:67,clientAge:35,deathAge:90},
  goal:{bestMo:8000,worstMo:5000},
  lifestyle:[],confidence:0,confidenceWhy:'',producerNotes:[],hasBudget:'',
  income:{Job:0,Spouse:0,'House Hack':0,Passive:0,Portfolio:0},
  assets:{House:0,Car:0,'Savings Acct.':0,Properties:0,Businesses:0,Checking:0},
  invest:{TSP:0,'401k':0,'Trad. IRA':0,'Roth IRA':0,CDs:0,Bonds:0,Crypto:0,Stocks:0,IUL:0,FIA:0,'403B':0,'457':0},
  debt:{'Student Loan':0,'Auto Loan':0,Mortgage:0,'Personal Loan':0,'Credit Cards':0,Medical:0,HELOC:0,'Payday Loans':0,'Equity Loans':0,'Pension Loans':0},
  expenses:{'Mortgage/Rent':0,'Property Tax':0,HOA:0,Utilities:0,Phone:0,Internet:0,Groceries:0,Subscriptions:0,Insurances:0,Gas:0,Childcare:0,Pets:0,'Petty Cash':0,'Debt Payments':0,Unforeseen:0},
  priorities:['Protect Family','Retirement','Emergency Savings','Debt Reduction','Tax Efficiency','College Funding','Legacy Planning','Business Planning','Charitable Giving'],
  health:{tier:'Standard',tobacco:false},
  household:{type:'',spouse:{name:'',dob:'',incomeMo:0},kids:[]},
  existing:{has:'',policies:[]},
  advisor:''
};}
function sum(o){var t=0;for(var k in o)t+=Number(o[k])||0;return t;}

function calc(d){
  var inc=sum(d.income),exp=sum(d.expenses),deb=sum(d.debt),ast=sum(d.assets),inv=sum(d.invest);
  var netMo=inc-exp, netYr=netMo*12;
  var savingsRate=inc>0?(netMo/inc):0;
  var debtPay=Number(d.expenses['Debt Payments'])||0;
  var debtMonths=debtPay>0?(deb/debtPay):0;
  var netWorth=ast+inv-deb;
  var retire=d.retire.best, cur=d.retire.clientAge, death=d.retire.deathAge;
  var yearsLeft=Math.max(0,retire-cur), yearsRet=Math.max(0,death-retire);
  var idealYr=(Number(d.goal.bestMo)||0)*12;
  var retireNeeded=idealYr*yearsRet;
  var neededYr=yearsLeft>0?(retireNeeded/yearsLeft):0;
  var neededMo=neededYr/12;
  var gapYr=netYr-neededYr;
  var liquid=(Number(d.assets['Savings Acct.'])||0)+(Number(d.assets['Checking'])||0)+(Number(d.invest['Stocks'])||0)+(Number(d.invest['Bonds'])||0)+(Number(d.invest['CDs'])||0);
  var replaceYears=Math.min(Math.max(yearsLeft,10),20);
  var insurable=Math.max(0, (inc*12*replaceYears===0? (inc*12*10):0) );
  insurable=Math.max(0, inc*12*Math.min(replaceYears,10) + deb - liquid);
  return {inc:inc,exp:exp,debt:deb,assets:ast,invest:inv,netMo:netMo,netYr:netYr,savingsRate:savingsRate,debtPay:debtPay,debtMonths:debtMonths,netWorth:netWorth,yearsLeft:yearsLeft,yearsRet:yearsRet,idealYr:idealYr,retireNeeded:retireNeeded,neededYr:neededYr,neededMo:neededMo,gapYr:gapYr,insurable:insurable,liquid:liquid,accredited:(liquid>=300000)};
}

/* ===== flow control ===== */
var STEPS=['welcome','household','coverage','import','vision','income','lifestyle','confidence','snapshot','cashflow','gap','priorities','reflection','advisor'];
function startNew(){CUR={id:null,data:blank(),status:'draft'};STEP=0;openFlow();}
function openPFR(id,toReport){togglePop&&document.querySelectorAll('.pop').forEach(function(x){x.classList.add('hide');});
  api({action:'pfr_get',id:id}).then(function(r){var p=r&&r.pfr;if(!p){toast('Could not load');return;}
    CUR={id:p.id,data:Object.assign(blank(),p.data||{}),status:p.status||'draft'};
    // deep-merge nested defaults
    var b=blank();for(var k in b){if(typeof b[k]==='object'&&!Array.isArray(b[k])){CUR.data[k]=Object.assign({},b[k],CUR.data[k]||{});}}
    if(toReport){showSummary();}else{STEP=0;openFlow();}
  });
}
function openFlow(){$('gallery').classList.add('hide');$('summary').classList.add('hide');$('flow').classList.remove('hide');renderStep();}
function exitFlow(){saveNow(true);$('flow').classList.add('hide');$('gallery').classList.remove('hide');}
function prevStep(){if(STEP>0){STEP--;renderStep();}}
function nextStep(){
  if(STEP>=STEPS.length-1){finishFlow();return;}
  STEP++;renderStep();saveNow();
}
function renderStep(){
  var pct=Math.round((STEP)/(STEPS.length-1)*100);
  $('progbar').style.width=pct+'%';
  $('stepLbl').textContent='Step '+(STEP+1)+' of '+STEPS.length;
  $('backBtn').style.visibility=STEP===0?'hidden':'visible';
  $('nextBtn').textContent=STEP===STEPS.length-1?'Finish & View Summary':'Continue';
  var fn=RENDER[STEPS[STEP]];$('stage').innerHTML=fn?fn():'';
  if(AFTER[STEPS[STEP]])AFTER[STEPS[STEP]]();
  $('fbody').scrollTop=0;
  refreshNoteBadge();
}
var d=function(){return CUR.data;};

/* autosave */
function setSaveLbl(txt,cls){var l=$('saveLbl');if(!l)return;l.textContent=txt;l.className='fsave'+(cls?(' '+cls):'');}
function scheduleSave(){clearTimeout(saveTimer);setSaveLbl('Unsaved changes…','dirty');saveTimer=setTimeout(function(){saveNow();},900);}
function saveManual(){
  if(!CUR)return;
  var nm=(CUR.data.client.name||'').trim();
  if(!CUR.id&&!nm){toast('Add the client’s name first, then save');try{var el=$('stage').querySelector('input');el&&el.focus();}catch(e){}return;}
  clearTimeout(saveTimer);saveNow();toast('Saved ✓');
}
/* ===== producer-only notes ===== */
function pnotes(){ if(!CUR)return []; if(!Array.isArray(CUR.data.producerNotes))CUR.data.producerNotes=[]; return CUR.data.producerNotes; }
function refreshNoteBadge(){ var b=$('notesCount'); if(!b)return; var n=pnotes().length; b.textContent=n; b.style.display=n?'inline-block':'none'; }
function openNotes(){ if(!CUR){toast('Open a client PFR first');return;} renderNotesList(); $('nov').classList.add('on'); setTimeout(function(){$('nnew')&&$('nnew').focus();},60); }
function closeNotes(){ $('nov').classList.remove('on'); }
function noteWhen(ts){ try{return new Date(ts).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch(e){return '';} }
function renderNotesList(){
  var L=$('nlist'); if(!L)return; var arr=pnotes();
  if(!arr.length){ L.innerHTML='<div class="nempty">No internal notes yet. Add the first one below.</div>'; return; }
  L.innerHTML=arr.map(function(n,i){return {n:n,i:i};}).reverse().map(function(o){
    return '<div class="nitem"><div class="nt">'+esc(o.n.t)+'</div><div class="nmeta">'+esc(o.n.a||'Producer')+' · '+noteWhen(o.n.ts)+'<button class="ndel" onclick="delNote('+o.i+')">Delete</button></div></div>';
  }).join('');
}
function addNote(){
  var el=$('nnew'); if(!el)return; var t=(el.value||'').trim(); if(!t)return;
  pnotes().push({t:t, a:(AGENT&&AGENT.name)||NAME||'Producer', ts:new Date().toISOString()});
  el.value=''; renderNotesList(); refreshNoteBadge(); clearTimeout(saveTimer); saveNow(); toast('Note added ✓');
}
function delNote(i){ var arr=pnotes(); if(i<0||i>=arr.length)return; if(!confirm('Delete this note?'))return; arr.splice(i,1); renderNotesList(); refreshNoteBadge(); clearTimeout(saveTimer); saveNow(); }
function saveNow(silent){
  if(!CUR)return;var dd=CUR.data;var c=calc(dd);
  if(!CUR.id&&!(dd.client.name||'').trim())return;
  var p={action:'pfr_save',id:CUR.id,code:CODE,agent_name:NAME,client_name:dd.client.name,client_phone:dd.client.phone,client_email:dd.client.email,data:dd,insurable_need:Math.round(c.insurable),status:CUR.status};
  /* capture the #1 recommended carrier/product so New Business can compare sold-vs-recommended */
  try{var _sd=dd.health?dd:JSON.parse(JSON.stringify(dd));if(!_sd.health)_sd.health={tier:'Standard',tobacco:false};
    var _s=buildStrategy(c,_sd);
    if(_s&&_s.recs&&_s.recs[0]){p.recommended_carrier=_s.recs[0].carrier||'';p.recommended_product=_s.recs[0].label||'';p.recommended_strategy=_s.headline||'';}
  }catch(e){}
  if(OPS)p.token='2026';
  setSaveLbl('Saving…','');
  api(p).then(function(r){if(r&&r.pfr&&r.pfr.id){CUR.id=r.pfr.id;}

    'Map synonyms (rent->Mortgage/Rent, food->Groceries, car payment->Debt Payments AND Auto Loan balance if given, 401(k)->401k, etc.). Balances (assets/debt/invest) are totals, not monthly.';
  fetch('https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/ai-api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'ask',system:sys,prompt:txt,max_tokens:900})})
   .then(function(r){return r.json();}).then(function(r){
     if(!(r&&r.ok&&r.answer)){ if(st)st.textContent='Could not read it — you can enter the numbers manually. '+((r&&r.error)?('('+r.error+')'):''); return; }

function stepperHTML(label,path,min,max){var v=getPath(path);
  return '<div class="stat" style="text-align:center"><div class="l">'+label+' retire age</div>'+
   '<div class="stepper" style="margin:12px 0 4px"><button onclick="bump(\''+path+'\',-1,'+min+','+max+')">−</button><div class="val" id="v_'+path.replace(/\./g,'_')+'">'+v+'</div><button onclick="bump(\''+path+'\',1,'+min+','+max+')">+</button></div>'+
   '<input type="range" min="'+min+'" max="'+max+'" value="'+v+'" oninput="setPath(\''+path+'\',+this.value);$(\'v_'+path.replace(/\./g,'_')+'\').textContent=this.value;scheduleSave();drawTimeline()"></div>';
}
function getPath(p){var o=d();p.split('.').forEach(function(k){o=o[k];});return o;}
function setPath(p,v){var o=d();var ks=p.split('.');for(var i=0;i<ks.length-1;i++)o=o[ks[i]];o[ks[ks.length-1]]=v;}
function bump(p,delta,min,max){var v=(+getPath(p)||0)+delta;if(v<min)v=min;if(v>max)v=max;setPath(p,v);var el=$('v_'+p.replace(/\./g,'_'));if(el)el.textContent=v;var r=el&&el.parentNode.parentNode.querySelector('input[type=range]');if(r)r.value=v;scheduleSave();drawTimeline();}

  function pos(a){return ((a-lo)/span*100);}
  b.innerHTML='<div class="seg" style="left:'+pos(cur)+'%;width:'+(pos(best)-pos(cur))+'%"></div>'+
   '<div class="pin" style="left:'+pos(cur)+'%"><b>'+cur+'</b><span>Today</span><div class="dot"></div></div>'+
   '<div class="pin worst" style="left:'+pos(d().retire.worst)+'%"><b>'+d().retire.worst+'</b><span>Worst</span><div class="dot"></div></div>'+

}

/* ===== strategy engine (top-3 GFI carrier match by age / health / finances) ===== */
var GFI_CARRIERS={
  IUL:['Symetra','North American','Ameritas','Allianz Life','Corebridge Financial','F&G','Mutual of Omaha'],
  Term:['Ethos','Corebridge Financial','Ameritas','Mutual of Omaha','Foresters Financial'],
  FIA:['Allianz Life','F&G','American Equity','North American','Corebridge Financial'],
  WL:['Mutual of Omaha','Foresters Financial','Ameritas','Corebridge Financial']
};
var CNOTE={'Symetra':'top-tier high-cash-value accumulation','North American':'strong accumulation IUL + competitive FIA','Ameritas':'low-cost IUL & competitive term','Allianz Life':'premier FIA income riders','Corebridge Financial':'broad, forgiving underwriting','F&G':'strong income products, friendlier underwriting','Mutual of Omaha':'senior-friendly underwriting','Foresters Financial':'family-friendly, moderate-health underwriting','Ethos':'instant no-exam decision for young & healthy','American Equity':'guaranteed-income FIA specialist'};
var LENIENT=['Mutual of Omaha','Foresters Financial','F&G','Corebridge Financial'];
var PLABEL={IUL:'Indexed Universal Life',Term:'Term Life',FIA:'Fixed Index Annuity',WL:'Whole Life / Final Expense'};
function hInfo(dd){var h=dd.health||{tier:'Standard',tobacco:false};var t=h.tier||'Standard';
  var lifeMult=t==='Excellent'?0.8:t==='Great'?0.9:t==='Poor'?1.5:t==='Ongoing health issues'?2.0:1.0;
  var wlMult=t==='Excellent'?0.85:t==='Great'?0.92:t==='Poor'?1.4:t==='Ongoing health issues'?1.8:1.0;
  var risky=!!h.tobacco||t==='Poor'||t==='Ongoing health issues';
  var noInstant=t==='Poor'||t==='Ongoing health issues';
  return {tier:t,tobacco:!!h.tobacco,lifeMult:lifeMult,wlMult:wlMult,risky:risky,noInstant:noInstant,word:(h.tobacco?'tobacco-use, ':'')+t.toLowerCase()+' health'};}
function roundTo(v,step){v=Math.max(0,Math.round(v||0));return Math.round(v/step)*step;}
function orderCarriers(prod,dd){var list=GFI_CARRIERS[prod].slice();var hi=hInfo(dd);
  if(prod==='Term'&&hi.noInstant)list=list.filter(function(x){return x!=='Ethos';});
  if(hi.risky)list.sort(function(a,b){return (LENIENT.indexOf(a)>=0?0:1)-(LENIENT.indexOf(b)>=0?0:1);});
  return list;}
function pickPrimary(c,dd){var age=+((dd.retire||{}).clientAge)||0;var lead=(dd.priorities||[])[0]||'';var surplus=Math.max(0,c.netMo);var liquid=c.liquid||0;
  if(lead==='Legacy Planning')return age>=58?'WL':'IUL';
  if(lead==='Protect Family')return (age>=60||surplus<200)?'Term':(age<55?'IUL':'Term');
  if(lead==='Retirement'||lead==='Tax Efficiency'||lead==='Business Planning')return age>=55?'FIA':'IUL';
  if(lead==='Emergency Savings'||lead==='Debt Reduction'||lead==='College Funding')return 'IUL';
  if(age>=60)return liquid>=50000?'FIA':'WL';
  if(age>=55)return 'FIA';
  return 'IUL';}
function pickComp(prim,c,dd){var age=+((dd.retire||{}).clientAge)||0;
  if(prim==='Term')return (Math.max(0,c.netMo)>=250&&age<58)?'IUL':'FIA';
  if(prim==='WL')return 'Term';
  return 'Term';}
function nIUL(c,dd){var surplus=Math.max(0,c.netMo);
  var prem=surplus>0?Math.min(Math.max(roundTo(surplus*0.4,25),150),4000):Math.max(150,roundTo((c.inc||0)*0.08,25));
  var face=Math.max(roundTo(c.insurable,25000),150000);return {mo:prem,yr:prem*12,face:face};}
function nTerm(c,dd,faceOv){var age=+((dd.retire||{}).clientAge)||40;var hi=hInfo(dd);
  var face=faceOv||Math.max(roundTo(c.insurable,25000),250000);
  var rate=age<30?0.032:age<40?0.05:age<50?0.085:age<60?0.19:0.42;
  var mo=Math.max(12,Math.round(face/1000*rate*hi.lifeMult*(hi.tobacco?2.2:1)));
  var term=Math.max(10,Math.min(30,roundTo(Math.max(0,((dd.retire||{}).best||65)-age),5)||10));
  return {mo:mo,yr:mo*12,face:face,term:term};}
function nFIA(c,dd){var age=+((dd.retire||{}).clientAge)||55;
  var prem=Math.max(roundTo(Math.max((c.liquid||0)*0.5,(c.invest||0)*0.4),5000),25000);
  var rate=age<60?0.05:age<65?0.055:age<70?0.06:0.065;var incYr=Math.round(prem*rate);
  return {prem:prem,incYr:incYr,incMo:Math.round(incYr/12)};}
function nWL(c,dd){var age=+((dd.retire||{}).clientAge)||60;var hi=hInfo(dd);
  var face=((dd.priorities||[])[0]==='Legacy Planning')?50000:20000;
  var per=age<50?1.2:age<60?2.2:age<70?3.6:5.6;
  var mo=Math.max(15,Math.round(face/1000*per*hi.wlMult*(hi.tobacco?1.6:1)));
  return {mo:mo,yr:mo*12,face:face};}
function stratHeadline(prim,comp){var m={IUL:'a max-funded IUL for tax-free growth + protection',FIA:'a fixed index annuity for protected retirement income',Term:'low-cost term protection',WL:'guaranteed whole-life / final-expense coverage'};var l={IUL:'an IUL accumulation layer',FIA:'a guaranteed-income annuity',Term:'a term protection layer',WL:'final-expense coverage'};return 'Lead with '+m[prim]+', layered with '+l[comp]+'.';}
function whyLine(prod,car,c,dd){var age=+((dd.retire||{}).clientAge)||0;var hi=hInfo(dd);var note=CNOTE[car]||'a strong fit';
  if(prod==='IUL')return 'Puts part of your '+money(Math.max(0,c.netMo))+'/mo surplus into tax-free growth and works to close the '+money(Math.abs(c.gapYr))+'/yr gap — '+note+', a fit at age '+age+' in '+hi.word+'.';
  if(prod==='Term')return 'Covers your family’s '+money(c.insurable)+' protection need at the lowest cost — '+note+', well-suited to age '+age+' in '+hi.word+'.';
  if(prod==='FIA')return 'Converts a lump sum into protected lifetime income for retirement at '+((dd.retire||{}).best||65)+' with no market risk — '+note+'.';
  return 'Locks in guaranteed coverage with simple underwriting — '+note+', ideal at age '+age+' in '+hi.word+'.';}
function numsFor(prod,c,dd){if(prod==='IUL'){var x=nIUL(c,dd);return [['Target premium',money(x.mo)+'/mo ('+money(x.yr)+'/yr)'],['Death benefit',money(x.face)]];}
  if(prod==='Term'){var t=nTerm(c,dd);return [['Est. premium',money(t.mo)+'/mo ('+money(t.yr)+'/yr)'],['Coverage',money(t.face)+' · '+t.term+'-yr term']];}
  if(prod==='FIA'){var f=nFIA(c,dd);return [['Starting premium',money(f.prem)],['Est. guaranteed income',money(f.incMo)+'/mo ('+money(f.incYr)+'/yr)']];}
  var w=nWL(c,dd);return [['Est. premium',money(w.mo)+'/mo ('+money(w.yr)+'/yr)'],['Death benefit',money(w.face)]];}
function buildStrategy(c,dd){var prim=pickPrimary(c,dd);var comp=pickComp(prim,c,dd);
  var primCar=orderCarriers(prim,dd),compCar=orderCarriers(comp,dd);var recs=[];
  [0,1].forEach(function(i){var car=primCar[i];if(!car)return;recs.push({rank:recs.length+1,carrier:car,prod:prim,label:PLABEL[prim],nums:numsFor(prim,c,dd),why:whyLine(prim,car,c,dd)});});
  var used=recs.map(function(r){return r.carrier;});var c3=compCar.filter(function(x){return used.indexOf(x)<0;})[0]||compCar[0];
  recs.push({rank:recs.length+1,carrier:c3,prod:comp,label:PLABEL[comp],nums:numsFor(comp,c,dd),why:whyLine(comp,c3,c,dd)});
  return {headline:stratHeadline(prim,comp),primary:prim,comp:comp,recs:recs.slice(0,3)};}
function stratCards(s){return s.recs.map(function(r){var nums=r.nums.map(function(n){return '<span class="pill" style="background:var(--gold-soft);color:var(--gold);border:none;font-weight:600"><b>'+esc(n[0])+':</b> '+esc(n[1])+'</span>';}).join(' ');
  return '<div class="pbrec"><div class="n" style="width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto">'+r.rank+'</div><div style="flex:1"><div class="pri">'+esc(r.carrier)+' — '+esc(r.label)+'</div><div style="margin:6px 0;display:flex;flex-wrap:wrap;gap:6px">'+nums+'</div><div class="wy">'+esc(r.why)+'</div></div></div>';}).join('');}
function renderStrategyInner(c,dd){var s=buildStrategy(c,dd);
  return '<div class="sec"><div class="obs neu" style="padding-top:0"><div class="ic">🧭</div><div class="ot"><b>Strategy:</b> '+esc(s.headline)+'</div></div>'+

function hfield(label,key,ph,type){var v=(d().household.spouse[key]!=null?d().household.spouse[key]:'');return '<div class="wfield"><label>'+esc(label)+'</label><input type="'+type+'" placeholder="'+ph+'" value="'+esc(v)+'" oninput="d().household.spouse[\''+key+'\']=this.value;scheduleSave()"></div>';}
function hSpouseMoney(){var v=Number(d().household.spouse.incomeMo)||0;return '<div class="wfield"><label>Spouse monthly income (for coverage)</label><input inputmode="numeric" placeholder="$0" value="'+(v?('$'+v.toLocaleString('en-US')):'')+'" oninput="var n=parseInt((this.value||\'\').replace(/[^0-9]/g,\'\'),10)||0;d().household.spouse.incomeMo=n;this.value=n?(\'$\'+n.toLocaleString(\'en-US\')):\'\';scheduleSave()"></div>';}
function addKid(){d().household.kids.push({name:'',age:'',collegeAge:18,collegeCost:0,saved529:0,monthlyContrib:0});scheduleSave();renderStep();}
function delKid(i){d().household.kids.splice(i,1);scheduleSave();renderStep();}
function kidCard(k,i){
 var t=(k.name||('Child '+(i+1)));
 return '<div class="macc open" style="margin-bottom:10px"><div class="macc-b" style="display:block;padding-top:4px">'+
  '<div style="font-weight:800;color:var(--ink);margin:2px 0 8px">🧒 '+esc(t)+'</div>'+
  '<div class="wform">'+
   kfield(i,'name','Child name','First name','text')+
   knum(i,'age','Age now')+
   knum(i,'collegeAge','College start age')+
   kmoney(i,'collegeCost','Est. total college cost')+
   kmoney(i,'saved529','Existing 529 / savings')+
   kmoney(i,'monthlyContrib','Monthly you can set aside')+
  '</div>'+
  '<button type="button" class="additem" onclick="delKid('+i+')" style="color:var(--red);border-color:var(--red)">✕ Remove child</button>'+
 '</div></div>';}
function kfield(i,key,label,ph,type){var v=d().household.kids[i][key];return '<div class="wfield"><label>'+esc(label)+'</label><input type="'+type+'" placeholder="'+ph+'" value="'+esc(v==null?'':v)+'" oninput="d().household.kids['+i+'][\''+key+'\']=this.value;scheduleSave()"></div>';}
function knum(i,key,label){var v=d().household.kids[i][key];return '<div class="wfield"><label>'+esc(label)+'</label><input inputmode="numeric" placeholder="0" value="'+(v==null?'':esc(v))+'" oninput="d().household.kids['+i+'][\''+key+'\']=this.value.replace(/[^0-9]/g,\'\');scheduleSave()"></div>';}
function kmoney(i,key,label){var v=Number(d().household.kids[i][key])||0;return '<div class="wfield"><label>'+esc(label)+'</label><input inputmode="numeric" placeholder="$0" value="'+(v?('$'+v.toLocaleString('en-US')):'')+'" oninput="var n=parseInt((this.value||\'\').replace(/[^0-9]/g,\'\'),10)||0;d().household.kids['+i+'][\''+key+'\']=n;this.value=n?(\'$\'+n.toLocaleString(\'en-US\')):\'\';scheduleSave()"></div>';}

/* ---- family plan render (shared by advisor step + report) ---- */
function kidCompareHTML(k){
 var age=Number(k.age)||0, ca=Number(k.collegeAge)||18, yrs=Math.max(0,ca-age);
 var saved=Number(k.saved529)||0, mo=Number(k.monthlyContrib)||0;
 var p529=_fvL(saved,0.06,yrs)+_fvM(mo,0.06,yrs);
 var mdb=_fvL(saved,0.045,yrs)+_fvM(mo,0.045,yrs);
 var name=esc(k.name||'this child');
 var yrsTxt = yrs>0 ? ('in ~'+yrs+' yr'+(yrs===1?'':'s')+' (age '+ca+')') : 'at college age';
 var col=function(title,val,valLbl,pts,accent){
   return '<div style="flex:1;min-width:220px;border:1px solid var(--line2);border-radius:14px;padding:14px;background:var(--panel2)">'+
     '<div style="font-weight:800;color:'+accent+';font-size:13px;margin-bottom:4px">'+title+'</div>'+
     '<div style="font-size:22px;font-weight:800;color:var(--ink)">'+money(val)+'</div>'+
     '<div style="font-size:11px;color:var(--ink3);margin-bottom:8px">'+valLbl+'</div>'+
     pts.map(function(x){return '<div style="font-size:12px;color:var(--ink2);margin:4px 0;display:flex;gap:6px"><span>'+x[0]+'</span><span>'+x[1]+'</span></div>';}).join('')+
   '</div>';};
 var c529=col('529 College Plan',p529,'Est. value '+yrsTxt+' (~6%/yr, tax-free for school)',
   [['✅','Tax-free growth for qualified education'],['✅','Simple, higher market-linked growth potential'],['⚠️','Non-education withdrawals: income tax + 10% penalty on gains'],['⚠️','Counts against financial aid; use limited to school']],'var(--accent)');
 var cmdb=col('🌟 Million Dollar Baby (child IUL)',mdb,'Est. accessible cash value '+yrsTxt+' (conservative, after policy costs)',
   [['✅','Locks in '+name+'’s insurability & low rate for life'],['✅','Cash value usable for ANY goal — college, business, first home — no penalty'],['✅','Permanent death benefit; keeps growing past college'],['⚠️','Insurance costs slow early growth; needs ongoing premium']],'var(--gold)');
 return '<div style="margin:10px 0 4px;font-weight:800;color:var(--ink)">🧒 '+name+(yrs>0?(' — '+yrs+' years to college'):'')+'</div>'+
   '<div style="display:flex;gap:12px;flex-wrap:wrap">'+c529+cmdb+'</div>';
}
function familyCoreHTML(dd,c){var h=dd.household||{};var fp=familyProtection(dd,c);var out='';
 if(h.type==='joint'){
   out+='<div class="obs neu" style="padding-top:0"><div class="ic">💑</div><div class="ot"><b>Household protection need:</b> about <b>'+money(fp.total)+'</b> — '+money(c.insurable)+' for '+esc((dd.client.name||'the primary').split(" ")[0])+' plus ~'+money(fp.spouseNeed)+' to replace the spouse’s income. A joint plan keeps both incomes protected.</div></div>';
 }
 var kids=(h.kids||[]).filter(function(k){return (k.name||k.age||k.monthlyContrib||k.saved529||k.collegeCost);});
 if(kids.length){
   out+='<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin:16px 0 4px">College funding — side by side</div>'+
     '<p class="qsub" style="margin:0 0 6px">Two honest ways to fund each child. The family picks — your job is to show both clearly.</p>'+
     kids.map(kidCompareHTML).join('')+
     '<div class="obs neu" style="margin-top:10px"><div class="ic">⚠️</div><div class="ot" style="font-size:12px">Figures are illustration estimates only (assumed growth, not guaranteed). 529 growth is market-dependent; IUL cash value depends on the carrier illustration and underwriting. Run the real illustration to confirm.</div></div>';
 }
 return out;
}
function familyBlock(dd,c){var core=familyCoreHTML(dd,c);if(!core)return '';return '<div class="sec"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);margin:6px 0 8px">👪 Total Family Plan</div>'+core+'</div>';}
function familyReport(c,dd){var core=familyCoreHTML(dd,c);if(!core)return '';return '<div class="sec"><h2>👪 Total Family Plan</h2>'+core+'</div>';}

/* ===== Existing coverage / 1035 exchange (added 2026-07-17) ===== */
function verdictColor(v){v=(v||'').toLowerCase();return v==='exchange'?'#c47f17':v==='keep'?'#1a9c52':'#6b7280';}
function verdictLabel(v){v=(v||'').toLowerCase();return v==='exchange'?'⇄ Consider 1035 exchange':v==='keep'?'✓ Likely keep':'○ Review further';}
RENDER.coverage=function(){var dd=d();if(!dd.existing)dd.existing={has:'',policies:[]};var e=dd.existing;
 var seg=function(v,lbl){return '<button type="button" class="chip'+(e.has===v?' on':'')+'" onclick="setExisting(\''+v+'\')">'+lbl+'</button>';};
 var bodyHTML = e.has==='yes' ? (
   (e.policies&&e.policies.length?e.policies.map(function(p,i){return policyCard(p,i);}).join(''):'<p class="qsub" style="margin:0 0 10px">Add each policy they currently hold.</p>')+
   '<button type="button" class="additem" onclick="addPolicy()"><b>+</b> Add a policy</button>') : '';
 return '<div class="eyebrow">Existing Coverage</div>'+
  '<h1 class="qh">Do you have any current life insurance policies?</h1>'+
  '<p class="qsub">Old IUL, whole life, universal, or term policies. Capturing the details lets the AI check whether a 1035 exchange could improve things — and Operations needs these numbers for the forms.</p>'+
  '<div class="chips" style="margin-bottom:12px">'+seg('yes','✅ Yes, I have coverage')+seg('no','🚫 No current policies')+'</div>'+
  bodyHTML;
};
function setExisting(v){d().existing.has=v;scheduleSave();renderStep();}
function addPolicy(){d().existing.policies.push({carrier:'',ptype:'',policyNo:'',deathBenefit:0,cashValue:0,premiumMo:0,issueYear:'',aiVerdict:'',aiAssessment:''});scheduleSave();renderStep();}
function delPolicy(i){d().existing.policies.splice(i,1);scheduleSave();renderStep();}
function pset(i,k,v){d().existing.policies[i][k]=v;scheduleSave();}
function pfield(i,key,label,ph,type){var v=d().existing.policies[i][key];return '<div class="wfield"><label>'+esc(label)+'</label><input type="'+type+'" placeholder="'+ph+'" value="'+esc(v==null?'':v)+'" oninput="pset('+i+',\''+key+'\',this.value)"></div>';}
function pnum(i,key,label,ph){var v=d().existing.policies[i][key];return '<div class="wfield"><label>'+esc(label)+'</label><input inputmode="numeric" placeholder="'+(ph||'0')+'" value="'+(v==null?'':esc(v))+'" oninput="pset('+i+',\''+key+'\',this.value.replace(/[^0-9]/g,\'\'))"></div>';}
function pmoney(i,key,label){var v=Number(d().existing.policies[i][key])||0;return '<div class="wfield"><label>'+esc(label)+'</label><input inputmode="numeric" placeholder="$0" value="'+(v?('$'+v.toLocaleString('en-US')):'')+'" oninput="var n=parseInt((this.value||\'\').replace(/[^0-9]/g,\'\'),10)||0;d().existing.policies['+i+'][\''+key+'\']=n;this.value=n?(\'$\'+n.toLocaleString(\'en-US\')):\'\';scheduleSave()"></div>';}
function policyCard(p,i){
 var types=['IUL','Whole Life','Universal Life','Term','Final Expense','Annuity','Other'];
 var opts='<option value="">Select type…</option>'+types.map(function(t){return '<option'+(p.ptype===t?' selected':'')+'>'+t+'</option>';}).join('');
 var badge=p.aiVerdict?'<span class="pill" style="background:'+verdictColor(p.aiVerdict)+';color:#fff;border:none;font-weight:700">'+verdictLabel(p.aiVerdict)+'</span>':'';
 return '<div class="macc open" style="margin-bottom:10px"><div class="macc-b" style="display:block;padding-top:4px">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin:2px 0 8px"><div style="font-weight:800;color:var(--ink)">📄 '+esc(p.carrier||('Policy '+(i+1)))+'</div>'+badge+'</div>'+
  '<div class="wform">'+
    pfield(i,'carrier','Carrier','e.g. Symetra','text')+
    '<div class="wfield"><label>Policy type</label><select onchange="pset('+i+',\'ptype\',this.value);renderStep()">'+opts+'</select></div>'+
    pfield(i,'policyNo','Policy number','on the statement','text')+
    pmoney(i,'deathBenefit','Death benefit')+
    pmoney(i,'cashValue','Cash value')+
    pmoney(i,'premiumMo','Monthly premium')+
    pnum(i,'issueYear','Year issued','YYYY')+
  '</div>'+
  '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px">'+
    '<button type="button" class="aibtn" onclick="eval1035('+i+')">🔍 AI: is this policy good or bad?</button>'+
    '<button type="button" class="additem" onclick="delPolicy('+i+')" style="color:var(--red);border-color:var(--red)">✕ Remove</button>'+
  '</div>'+
  '<div id="p1035_'+i+'" style="margin-top:8px">'+(p.aiAssessment?assessmentHTML(p):'')+'</div>'+
 '</div></div>';}
function assessmentHTML(p){return '<div class="aiscript"><h4>🔍 1035 analysis — '+verdictLabel(p.aiVerdict)+'</h4><div class="segtx" style="white-space:pre-wrap">'+esc(p.aiAssessment)+'</div><div class="aitools"><button onclick="copyLive(this)">📋 Copy</button><span class="aitag">Internal agent analysis · replacement &amp; suitability rules apply — verify before recommending</span></div></div>';}
function eval1035(i){var dd=d();var p=dd.existing.policies[i];if(!p)return;var box=$('p1035_'+i);
 if(box)box.innerHTML='<div class="aiscript"><div class="segtx" style="color:var(--ink3)">🤖 Claude is analyzing this policy…</div></div>';
 var c=calc(dd);
 var ctx='EXISTING POLICY to evaluate:\nCarrier: '+(p.carrier||'?')+'\nType: '+(p.ptype||'?')+'\nDeath benefit: '+money(p.deathBenefit||0)+'\nCash value: '+money(p.cashValue||0)+'\nMonthly premium: '+money(p.premiumMo||0)+(p.issueYear?('\nYear issued: '+p.issueYear):'')+'\n\nCLIENT PFR CONTEXT:\n'+pfrAIContext(dd,c);
 fetch('https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/ai-api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'pfr_1035',prompt:ctx})}).then(function(r){return r.json();}).then(function(r){
   var a=(r&&r.answer)||'';if(!(r&&r.ok&&a)){var b=$('p1035_'+i);if(b)b.innerHTML='<div class="aitag" style="font-size:12px;color:var(--ink3)">Live AI unavailable right now — the policy is still saved for Ops.'+((r&&r.error)?(' ('+esc(r.error)+')'):'')+'</div>';return;}
   var m=a.match(/VERDICT:\s*(KEEP|REVIEW|EXCHANGE)/i);p.aiVerdict=m?m[1].toLowerCase():'review';
   p.aiAssessment=a.replace(/VERDICT:\s*(KEEP|REVIEW|EXCHANGE)/i,'').trim();
   scheduleSave();renderStep();
 }).catch(function(){var b=$('p1035_'+i);if(b)b.innerHTML='<div class="aitag" style="font-size:12px;color:var(--ink3)">Live AI unavailable right now — the policy is still saved for Ops.</div>';});
}
function existingReport(dd){var e=dd.existing;if(!e||e.has!=='yes'||!e.policies||!e.policies.length)return '';
 var rows=e.policies.filter(function(p){return p&&(p.carrier||p.policyNo||p.deathBenefit||p.cashValue);}).map(function(p){
   return '<div class="krow" style="margin-bottom:6px">'+kv('Carrier',p.carrier||'—')+kv('Type',p.ptype||'—')+kv('Policy #',p.policyNo||'—')+kv('Death benefit',money(p.deathBenefit||0))+kv('Cash value',money(p.cashValue||0))+kv('Premium',money(p.premiumMo||0)+'/mo')+(p.aiVerdict?kv('1035 view',verdictLabel(p.aiVerdict)):'')+'</div>'+
     (p.aiAssessment?'<div class="obs neu" style="margin:2px 0 12px"><div class="ic">🔍</div><div class="ot" style="font-size:12px;white-space:pre-wrap">'+esc(p.aiAssessment)+'</div></div>':'');
 }).join('');
 if(!rows)return '';
 return '<div class="sec"><h2>📄 Existing Coverage &amp; 1035 Review</h2><p class="qsub" style="margin:0 0 8px">Captured for Operations — all 1035 forms require policy #, death benefit, and cash value. AI notes are internal decision-support; replacement &amp; suitability rules apply.</p>'+rows+'</div>';}
</script>
<script defer src="notif.js"></script>
