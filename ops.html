<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Operations Tracker — The Standard Financial Group</title>
<style>
:root{
  --bg:#f5f5f7;--panel:#fff;--panel2:#fbfbfd;--ink:#1d1d1f;--ink2:#6e6e73;--ink3:#8e8e93;
  --line:#ececf0;--line2:#e3e3e8;--accent:#5b6cff;--gold:#c99a2e;--gold-dp:#8a6d1f;--gold-br:#b8891f;
  --green:#1a9c52;--red:#d0392b;--amber:#b7791f;--shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);
  --shadow:0 2px 8px rgba(0,0,0,.05),0 14px 40px rgba(0,0,0,.07);--shadow-lg:0 24px 60px rgba(0,0,0,.16);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;--goldsoft:rgba(201,154,46,.12);
}
[data-theme="dark"]{--bg:#0a0a0c;--panel:#161618;--panel2:#1c1c1f;--ink:#f5f5f7;--ink2:#a1a1a8;--ink3:#77777e;--line:#26262a;--line2:#2e2e33;--accent:#7c8bff;--gold:#e6c260;--gold-br:#e6c260;--goldsoft:rgba(230,194,96,.12);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.gate::before,.gate::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.gate::before{width:440px;height:440px;background:radial-gradient(circle,var(--gold),transparent 70%);top:-140px;right:-90px;opacity:.32}
.gate::after{width:380px;height:380px;background:radial-gradient(circle,#8b9bff,transparent 70%);bottom:-130px;left:-70px;opacity:.4}
.gate-card{position:relative;width:100%;max-width:410px;background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lg);padding:36px 32px;text-align:center}
.gate-badge{width:56px;height:56px;border-radius:15px;margin:0 auto 15px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));display:flex;align-items:center;justify-content:center;font-size:26px}
.gate-card h1{font-size:22px;font-weight:800;margin:0 0 3px;letter-spacing:-.02em}
.gate-card p{font-size:13.5px;color:var(--ink2);margin:0 0 22px}
.gate-card input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:15px;outline:none;margin-bottom:11px}
.gate-card input:focus{border-color:var(--gold)}
.gbtn{width:100%;border:none;padding:13px;border-radius:12px;font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff;cursor:pointer;font-family:inherit;margin-top:4px}
.gmsg{font-size:13px;font-weight:700;color:var(--red);margin-top:12px;min-height:16px}
.ghint{font-size:11.5px;color:var(--ink3);margin-top:14px;line-height:1.5}
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:13px 22px;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(1.6) blur(14px);border-bottom:1px solid var(--line);flex-wrap:wrap}
.top .bdot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));display:flex;align-items:center;justify-content:center;font-size:15px}
.top h1{font-size:15.5px;font-weight:800;margin:0;letter-spacing:-.02em}
.top .who{font-size:12px;color:var(--ink3);font-weight:600}
.rolechip{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:7px}
.rolechip.ops{background:var(--goldsoft);color:var(--gold-br)}
.rolechip.view{background:rgba(91,108,255,.12);color:var(--accent)}
.sp{margin-left:auto}
.iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);cursor:pointer;font-size:15px}
.signout{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);font-weight:700;font-size:13px;padding:8px 13px;border-radius:10px;cursor:pointer}
.bell{position:relative}
.bell .badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--bg)}
.bell.ring{animation:bellring .6s ease}
@keyframes bellring{0%,100%{transform:rotate(0)}20%{transform:rotate(-16deg)}40%{transform:rotate(13deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(4deg)}}
.ntf{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;background:var(--panel2)}
.ntf.new{border-color:var(--gold-dp);background:var(--goldsoft)}
.ntf .nt{font-weight:800;font-size:14px}
.ntf .nm{font-size:12.5px;color:var(--ink3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.ntf a.zoom{display:inline-block;margin-top:9px;font-size:12.5px;font-weight:800;color:#fff;background:var(--accent);padding:7px 13px;border-radius:9px;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:20px 22px 90px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{border:1px solid var(--line);border-radius:14px;padding:15px;background:linear-gradient(135deg,var(--goldsoft),var(--panel));box-shadow:var(--shadow-sm)}
.stat .n{font-size:23px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.stat .l{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.reqbanner{border:1.5px solid var(--gold-dp);background:var(--goldsoft);border-radius:14px;padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13.5px;font-weight:700}
.reqbanner button{margin-left:auto;border:none;background:var(--gold);color:#fff;font-weight:800;font-size:12.5px;padding:8px 14px;border-radius:9px;cursor:pointer;font-family:inherit}
.togglebar{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:13px;padding:4px;gap:3px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
.tgl{border:none;background:none;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--ink3);padding:10px 18px;border-radius:10px;cursor:pointer;white-space:nowrap}
.tgl.on{background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff}
.tglrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.searchbar{flex:1;min-width:180px;max-width:300px;padding:10px 13px;border:1.5px solid var(--line2);border-radius:11px;background:var(--panel);color:var(--ink);font-size:14px;outline:none;font-family:inherit}
.tablewrap{border:1px solid var(--line);border-radius:15px;overflow:auto;max-height:70vh;background:var(--panel);box-shadow:var(--shadow-sm)}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{position:sticky;top:0;background:var(--panel2);color:var(--gold-br);text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:11px 13px;border-bottom:1px solid var(--line);white-space:nowrap;z-index:1}
.ptable th.r,.ptable td.r{text-align:right}
.ptable td{padding:10px 13px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap}
.ptable tr:hover td{background:var(--panel2)}
.namebtn{background:none;border:none;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--accent);cursor:pointer;padding:0;text-align:left;letter-spacing:-.01em}
.namebtn:hover{text-decoration:underline}
.sub{font-size:11px;color:var(--ink3);font-weight:600}
.pill{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:7px;white-space:nowrap}
.pill.lic{background:rgba(26,156,82,.14);color:var(--green)}
.pill.exam{background:rgba(183,121,31,.16);color:var(--amber)}
.pill.pre{background:rgba(91,108,255,.13);color:var(--accent)}
.pill.none{background:var(--panel2);color:var(--ink3);border:1px solid var(--line2)}
.mbar{height:7px;border-radius:999px;background:var(--line);overflow:hidden;width:80px;display:inline-block;vertical-align:middle}
.mbar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e6c874)}
.ms{display:inline-flex;gap:4px}
.mschip{font-size:13px;opacity:.28;filter:grayscale(1)}
.mschip.on{opacity:1;filter:none}
.miss{color:var(--red);font-weight:800}
.spin,.empty{padding:30px;text-align:center;color:var(--ink3);font-size:14px;font-weight:600}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:26px}
.tile{display:block;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:15px;box-shadow:var(--shadow-sm)}
.tile:hover{transform:translateY(-2px)}
.tile .ti{font-size:20px}.tile .tt{font-weight:800;font-size:14px;margin-top:7px}.tile .td{font-size:11.5px;color:var(--ink3);margin-top:2px}
/* drawer */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.44);display:none;justify-content:flex-end;z-index:60}
.ov.on{display:flex}
.drawer{width:100%;max-width:540px;background:var(--panel);height:100%;overflow:auto;box-shadow:var(--shadow-lg);padding:0}
.dhd{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;gap:12px;z-index:2}
.dhd h3{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
.dhd .x{margin-left:auto;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;flex:0 0 auto}
.dbody{padding:18px 22px 40px}
.dsec{margin-bottom:22px}
.dsec h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-br);margin:0 0 11px;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--panel);color:var(--ink);outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg input[readonly],.fg textarea[readonly]{background:var(--panel2);color:var(--ink2)}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.dbtn{border:none;background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff;font-weight:800;font-size:14px;padding:11px 18px;border-radius:11px;cursor:pointer;font-family:inherit}
.dbtn.ghost{background:var(--panel);color:var(--ink2);border:1px solid var(--line2)}
.polrow{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;background:var(--panel2)}
.polrow .pt{font-weight:800;font-size:13.5px}
.polrow .pm{font-size:12px;color:var(--ink3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.reqitem{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;background:var(--panel2)}
.reqitem .rq{font-weight:700;font-size:13px}
.reqitem .rm{font-size:11.5px;color:var(--ink3);margin-top:3px}
.reqitem .ra{display:flex;gap:7px;margin-top:9px}
.reqitem .ra button{border:none;font-weight:800;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:80}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hide{display:none!important}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-badge">🛡️</div>
    <h1>Operations Tracker</h1>
    <p>Licensing · New Business · Fast Start</p>
    <input id="gName" placeholder="Your name" autocomplete="name">
    <input id="gCode" placeholder="Operations code (0000–4) or your GFI code" autocomplete="off">
    <button class="gbtn" id="gBtn">Enter →</button>
    <div class="gmsg" id="gMsg"></div>
    <div class="ghint"><b>Operations staff</b> (codes 0000–0004) can view &amp; edit everything.<br><b>MDs &amp; EMDs</b> sign in with their GFI code to view &amp; submit edit requests.</div>
  </div>
</div>

<div id="app" class="hide">
  <div class="top">
    <div class="bdot">🛡️</div>
    <div><h1>Operations Tracker</h1><div class="who" id="whoLbl"></div></div>
    <span id="roleChip"></span>
    <span class="sp"></span>
    <button class="iconbtn bell hide" id="bellBtn" onclick="openNotif()" title="Booking notifications">🔔<span class="badge hide" id="bellBadge">0</span></button>
    <button class="iconbtn" onclick="toggleTheme()" title="Theme">◐</button>
    <button class="signout" onclick="signOut()">Sign out</button>
  </div>
  <div class="wrap">
    <div class="stat-grid" id="statGrid"></div>
    <div id="reqBanner"></div>
    <div class="tglrow">
      <div class="togglebar">
        <button class="tgl on" id="tg_licensing" onclick="setTab('licensing')">🎫 Licensing</button>
        <button class="tgl" id="tg_newbiz" onclick="setTab('newbiz')">💰 New Business</button>
        <button class="tgl" id="tg_faststart" onclick="setTab('faststart')">🚀 Fast Start</button>
      </div>
      <input class="searchbar" id="search" placeholder="Search name, code, state…" oninput="renderTab()">
    </div>
    <div class="tablewrap"><div id="tableHost"><div class="spin">Loading tracker…</div></div></div>
    <div id="opsTiles"></div>
  </div>
</div>

<div class="ov" id="ov"><div class="drawer" id="drawer"></div></div>
<div class="toast" id="toast"></div>

<script>
var OD="https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/ops-directory";
var OPS=null,TOKEN="",ROWS=[],TAB="licensing",CUR=null;
function $(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(t){var e=$('toast');e.textContent=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('on');},2400);}
function money(n){n=Math.round(Number(n)||0);return '$'+n.toLocaleString('en-US');}
function money2(n){n=Number(n)||0;if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return '$'+(Math.round(n/100)/10)+'K';return '$'+Math.round(n);}
function toggleTheme(){var d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');try{localStorage.setItem('gfi_theme',d?'light':'dark');}catch(e){}}
(function(){try{var t=localStorage.getItem('gfi_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
function signOut(){try{sessionStorage.removeItem('tsfg_ops');}catch(e){}OPS=null;$('app').classList.add('hide');$('gate').classList.remove('hide');$('gName').value='';$('gCode').value='';}
function auth(extra){var b=extra||{};if(OPS&&OPS.role==='ops')b.token='2026';if(OPS)b.by_code=OPS.code;return b;}
function canEdit(){return OPS&&OPS.role==='ops';}
function api(body){return fetch(OD,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});}

/* ---- login ---- */
function doLogin(){
  var name=$('gName').value.trim(),code=$('gCode').value.trim();var msg=$('gMsg');
  if(!name){msg.textContent='Enter your name.';return;}
  if(!code){msg.textContent='Enter your code.';return;}
  msg.style.color='var(--ink3)';msg.textContent='Checking…';
  api({action:'ops_login',code:code,name:name}).then(function(r){
    if(!r||!r.ok){msg.style.color='var(--red)';msg.textContent=(r&&r.error)||'Could not sign in.';return;}
    OPS={code:r.ops.code,name:r.ops.name,title:r.ops.title,role:r.role,can_edit:r.can_edit,baseshops:r.ops.baseshops||[]};
    try{sessionStorage.setItem('tsfg_ops',JSON.stringify(OPS));}catch(e){}
    showApp();
  }).catch(function(){msg.style.color='var(--red)';msg.textContent='Network error — try again.';});
}
$('gBtn').addEventListener('click',doLogin);
['gName','gCode'].forEach(function(id){$(id).addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});});

function showApp(){
  $('gate').classList.add('hide');$('app').classList.remove('hide');
  $('whoLbl').textContent=OPS.name+' · '+(OPS.title||'')+((OPS.baseshops&&OPS.baseshops.length)?(' · '+OPS.baseshops.join(' & ')):'');
  $('roleChip').innerHTML=canEdit()?'<span class="rolechip ops">Operations · full edit</span>':'<span class="rolechip view">'+esc((OPS.role||'').toUpperCase())+' · view + request</span>';
  $('opsTiles').innerHTML=canEdit()?('<div class="tiles">'+
    '<a class="tile" href="dashboard.html"><div class="ti">📊</div><div class="tt">Onboarding Dashboard</div><div class="td">90-day progress detail</div></a>'+
    '<a class="tile" href="newbusiness.html"><div class="ti">💰</div><div class="tt">New Business</div><div class="td">Full policy ledger</div></a>'+
    '<a class="tile" href="index.html"><div class="ti">🏆</div><div class="tt">Leaderboard</div><div class="td">Company standings</div></a>'+
    '<a class="tile" href="calendar.html"><div class="ti">🗓️</div><div class="tt">Scheduler</div><div class="td">Bookings & availability</div></a>'+
    '</div>'):'';
  loadOverview();loadTracker();setupNotif();
}
function prettyDate(d){if(!d)return '';var p=String(d).split('-');if(p.length<3)return d;var dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'});}

/* ---- notifications: Operations bookings (bell) ---- */
var NOTIF={list:[],notified:{}};
function notifSeenKey(){return 'ops_notif_seen_'+(OPS?OPS.code:'x');}
function notifSeen(){try{return localStorage.getItem(notifSeenKey())||'';}catch(e){return '';}}
function setupNotif(){
  var bell=$('bellBtn');
  if(!canEdit()){if(bell)bell.classList.add('hide');return;}
  if(bell)bell.classList.remove('hide');
  try{if(window.Notification&&Notification.permission==='default')Notification.requestPermission();}catch(e){}
  loadNotif();
  if(window._ntfTimer)clearInterval(window._ntfTimer);
  window._ntfTimer=setInterval(function(){if(!document.hidden)loadNotif();},60000);
}
function loadNotif(){
  api(auth({action:'ops_bookings',code:OPS.code})).then(function(r){
    if(!r||!r.ok)return;NOTIF.list=r.bookings||[];var seen=notifSeen();
    var fresh=NOTIF.list.filter(function(b){return b.created_at&&(!seen||b.created_at>seen);});
    var badge=$('bellBadge');if(!badge)return;
    if(fresh.length){badge.textContent=fresh.length>9?'9+':String(fresh.length);badge.classList.remove('hide');var bl=$('bellBtn');if(bl){bl.classList.remove('ring');void bl.offsetWidth;bl.classList.add('ring');}}
    else badge.classList.add('hide');
    fresh.forEach(function(b){if(NOTIF.notified[b.id])return;NOTIF.notified[b.id]=1;
      try{if(window.Notification&&Notification.permission==='granted')new Notification('New Operations booking',{body:(b.agent||'Someone')+' booked you — '+prettyDate(b.date)+' '+(b.time||'')+' PT'});}catch(e){}
    });
  }).catch(function(){});
}
function openNotif(){
  var list=NOTIF.list;var seen=notifSeen();
  var h='<div class="dhd"><div><h3>Booking notifications</h3><div class="sub">People who booked you for a Zoom</div></div><button class="x" onclick="closeDrawer()">✕</button></div><div class="dbody">';
  if(!list.length)h+='<div class="empty">No bookings yet. When an agent books you from the Scheduler → Base Ops, it shows up here.</div>';
  else h+=list.map(function(b){var isNew=b.created_at&&(!seen||b.created_at>seen);
    return '<div class="ntf'+(isNew?' new':'')+'"><div class="nt">'+(isNew?'🔵 ':'')+esc(b.agent||'Someone')+' booked you</div><div class="nm"><span>📅 '+esc(prettyDate(b.date))+' · '+esc(b.time||'')+' PT</span><span>'+esc(b.category||'Operations')+'</span>'+(b.conf?('<span>'+esc(b.conf)+'</span>'):'')+'</div>'+(b.notes?('<div class="nm">“'+esc(b.notes)+'”</div>'):'')+(b.meeting_link?('<a class="zoom" href="'+esc(b.meeting_link)+'" target="_blank" rel="noopener">Join Zoom →</a>'):'')+'</div>';
  }).join('');
  h+='</div>';$('drawer').innerHTML=h;$('ov').classList.add('on');
  var newest=list.reduce(function(m,b){return (b.created_at&&b.created_at>m)?b.created_at:m;},seen);
  try{localStorage.setItem(notifSeenKey(),newest||new Date().toISOString());}catch(e){}
  var badge=$('bellBadge');if(badge)badge.classList.add('hide');
}

/* ---- overview ---- */
function loadOverview(){
  api(auth({action:'overview'})).then(function(r){
    if(!r||!r.ok)return;var o=r.overview||{};
    var bases=Object.keys(o.by_base||{}).map(function(b){return b+' '+o.by_base[b];}).join(' · ');
    $('statGrid').innerHTML=
      st(o.agents,'Agents')+st(o.licensed+' / '+o.agents,'Licensed')+st(o.complete+' / '+o.agents,'Profiles Complete')+st(money2(o.month_ap||0),'AP Submitted · MTD')+st(bases||'—','By Baseshop',1);
  });
}
function st(n,l,sm){return '<div class="stat"><div class="n"'+(sm?' style="font-size:13px;line-height:1.45"':'')+'>'+esc(String(n))+'</div><div class="l">'+esc(l)+'</div></div>';}

/* ---- tracker ---- */
function loadTracker(){
  api(auth({action:'tracker'})).then(function(r){
    if(!r||!r.ok){$('tableHost').innerHTML='<div class="empty">Could not load the tracker.</div>';return;}
    ROWS=r.rows||[];renderReqBanner(r.pending_requests||0);renderTab();
  }).catch(function(){$('tableHost').innerHTML='<div class="empty">Could not load the tracker.</div>';});
}
function renderReqBanner(n){
  var host=$('reqBanner');if(!host)return;
  if(canEdit()&&n>0){host.innerHTML='<div class="reqbanner">✏️ '+n+' edit request'+(n===1?'':'s')+' from leaders awaiting review<button onclick="openRequests()">Review requests</button></div>';}
  else host.innerHTML='';
}
function setTab(t){TAB=t;['licensing','newbiz','faststart'].forEach(function(x){var b=$('tg_'+x);if(b)b.classList.toggle('on',x===t);});renderTab();}
function filtered(){var q=($('search').value||'').trim().toLowerCase();return ROWS.filter(function(r){if(!q)return true;return (r.name+' '+r.code+' '+r.state+' '+r.baseshop+' '+(r.direct_to_name||'')).toLowerCase().indexOf(q)>=0;});}
function licPill(s){var c=s==='Licensed'?'lic':(s==='Exam Passed'?'exam':(s==='Pre-Licensing'?'pre':'none'));return '<span class="pill '+c+'">'+esc(s||'—')+'</span>';}
function nm(r){return '<button class="namebtn" onclick="openAgent(\''+esc(r.code)+'\')">'+esc(r.name||'—')+'</button><div class="sub">'+esc(r.contract_level||'')+'</div>';}
function renderTab(){
  var rows=filtered();var host=$('tableHost');
  if(!rows.length){host.innerHTML='<div class="empty">No matches.</div>';return;}
  var h='<table class="ptable"><thead><tr>';
  if(TAB==='licensing'){
    h+='<th>Agent</th><th>GFI Code</th><th>Direct Recruiter</th><th>Baseshop</th><th>ICA Date</th><th>License Type</th><th>State</th><th>Progress</th></tr></thead><tbody>';
    h+=rows.map(function(r){return '<tr><td>'+nm(r)+'</td><td>'+esc(r.code)+'</td><td>'+(r.direct_to_name?esc(r.direct_to_name):'<span class="miss">—</span>')+(r.direct_to?'<div class="sub">'+esc(r.direct_to)+'</div>':'')+'</td><td>'+esc(r.baseshop||'—')+'</td><td>'+(r.ica_date?esc(r.ica_date):'<span class="miss">—</span>')+'</td><td>'+(r.license_type?esc(r.license_type):'<span class="miss">—</span>')+'</td><td>'+(r.state?esc(r.state):'<span class="miss">—</span>')+'</td><td>'+licPill(r.license_status)+'</td></tr>';}).join('');
  } else if(TAB==='newbiz'){
    h+='<th>Agent</th><th>GFI Code</th><th>Baseshop</th><th class="r">Policies</th><th class="r">AP Submitted</th><th class="r">Pending</th><th class="r">Paid</th><th class="r">Chargebacks</th></tr></thead><tbody>';
    h+=rows.map(function(r){var n=r.nb||{};return '<tr><td>'+nm(r)+'</td><td>'+esc(r.code)+'</td><td>'+esc(r.baseshop||'—')+'</td><td class="r">'+(n.count||0)+'</td><td class="r"><b>'+money(n.ap||0)+'</b></td><td class="r">'+(n.pending||0)+'</td><td class="r">'+(n.paid||0)+'</td><td class="r">'+(n.cb?money(n.cb):'—')+'</td></tr>';}).join('');
  } else {
    h+='<th>Agent</th><th>GFI Code</th><th>Pathway</th><th>Onboarding</th><th class="r">Steps</th><th>Milestones</th><th>Last Active</th></tr></thead><tbody>';
    h+=rows.map(function(r){var pct=Math.max(0,Math.min(100,r.pct||0));var m=r.ms||{};var di=r.days_inactive;
      var last=di==null?'—':(di===0?'today':(di===1?'yesterday':di+'d ago'));
      var chips='<span class="ms"><span class="mschip'+(m.licensed?' on':'')+'" title="Licensed">🎫</span><span class="mschip'+(m.first_sale?' on':'')+'" title="First sale">💰</span><span class="mschip'+(m.first_recruit?' on':'')+'" title="First recruit">🤝</span></span>';
      return '<tr><td>'+nm(r)+'</td><td>'+esc(r.code)+'</td><td>'+(r.pathway?esc(r.pathway):'—')+'</td><td><span class="mbar"><span style="width:'+pct+'%"></span></span> <b style="font-size:12px">'+pct+'%</b></td><td class="r">'+(r.steps_done||0)+'</td><td>'+chips+'</td><td>'+esc(last)+'</td></tr>';}).join('');
  }
  h+='</tbody></table>';host.innerHTML=h;
}

/* ---- agent drawer ---- */
var LICTYPES=['Life','Health','Life & Health','Life & Annuity','Property & Casualty','Series 6/63','Other'];
var LICSTATUS=['Not Started','Pre-Licensing','Exam Passed','Licensed'];
function openAgent(code){
  $('drawer').innerHTML='<div class="dbody"><div class="spin">Loading…</div></div>';$('ov').classList.add('on');
  api(auth({action:'agent_get',code:code})).then(function(r){
    if(!r||!r.ok){$('drawer').innerHTML='<div class="dbody"><div class="empty">Could not load agent.</div></div>';return;}
    CUR=r;paintAgent(r);
  });
}
function closeDrawer(){$('ov').classList.remove('on');CUR=null;}
function fld(id,label,val,ro,opts){
  var input;
  if(opts){input='<select id="'+id+'"'+(ro?' disabled':'')+'>'+opts.map(function(o){return '<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select>';}
  else input='<input id="'+id+'" value="'+esc(val||'')+'"'+(ro?' readonly':'')+'>';
  return '<div class="fg"><label>'+esc(label)+'</label>'+input+'</div>';
}
function paintAgent(r){
  var a=r.agent;var ro=!canEdit();
  var h='<div class="dhd"><div><h3>'+esc(a.name)+'</h3><div class="sub">'+esc(a.code)+' · '+esc(a.contract_level)+' · '+esc(a.baseshop||'')+'</div></div><button class="x" onclick="closeDrawer()">✕</button></div><div class="dbody">';
  // contact
  h+='<div class="dsec"><h4>👤 Contact</h4>'+
     '<div class="frow">'+fld('e_first','First name',a.name.split(' ')[0],ro)+fld('e_last','Last name',a.name.split(' ').slice(1).join(' '),ro)+'</div>'+
     '<div class="frow">'+fld('e_phone','Phone',r.phone,ro)+fld('e_email','Email',r.email,ro)+'</div>'+
     '<div class="fg"><label>Direct recruiter (from org chart)</label><input value="'+esc((r.direct_to_name||'—')+(r.direct_to?(' · '+r.direct_to):''))+'" readonly></div></div>';
  // licensing
  h+='<div class="dsec"><h4>🎫 Licensing</h4>'+
     '<div class="frow">'+fld('e_state','State of record',a.state,ro)+fld('e_ica','ICA date',a.ica_date,ro)+'</div>'+
     '<div class="frow">'+fld('e_ltype','License type',a.license_type,ro,LICTYPES)+fld('e_lnum','License #',a.license_number,ro)+'</div>'+
     fld('e_lstat','Progress / status',a.license_status,ro,LICSTATUS)+'</div>';
  // fast start
  var m=a.ms||{};var pct=Math.max(0,Math.min(100,a.pct||0));
  h+='<div class="dsec"><h4>🚀 Fast Start</h4><div style="font-size:13px;color:var(--ink2);display:flex;gap:16px;flex-wrap:wrap"><span>Pathway: <b>'+esc(a.pathway||'—')+'</b></span><span>Onboarding: <b>'+pct+'%</b></span><span>Steps: <b>'+(a.steps_done||0)+'</b></span></div>'+
     '<div style="margin-top:10px;display:flex;gap:14px;font-size:12.5px;font-weight:700"><span>'+(m.licensed?'✅':'⬜')+' Licensed</span><span>'+(m.first_sale?'✅':'⬜')+' First sale</span><span>'+(m.first_recruit?'✅':'⬜')+' First recruit</span></div></div>';
  // new business
  var pols=r.policies||[];
  h+='<div class="dsec"><h4>💰 New Business ('+pols.length+')</h4>';
  if(!pols.length)h+='<div class="sub">No policies submitted yet.</div>';
  else h+=pols.map(function(p){return '<div class="polrow"><div class="pt">'+esc(p.client_name||'—')+' · '+money(p.annual_premium)+'</div><div class="pm"><span>'+esc((p.carrier||'')+(p.product?(' · '+p.product):'')||'—')+'</span><span>'+esc(p.status||'')+'</span><span>'+esc(p.submitted_date||'')+'</span>'+((p.monthly_contribution!=null&&p.monthly_contribution!=='')?('<span>mo '+money(p.monthly_contribution)+'</span>'):'')+((p.lump_sum_contribution!=null&&p.lump_sum_contribution!=='')?('<span>lump '+money(p.lump_sum_contribution)+'</span>'):'')+'</div></div>';}).join('');
  h+='</div>';
  // notes
  h+='<div class="dsec"><h4>📝 Operations notes</h4><div class="fg"><textarea id="e_notes" rows="3"'+(ro?' readonly':'')+'>'+esc(r.ops_notes||'')+'</textarea></div></div>';
  // actions
  if(canEdit())h+='<div style="display:flex;gap:10px"><button class="dbtn" onclick="saveAgent(\''+esc(a.code)+'\')">Save changes</button><button class="dbtn ghost" onclick="closeDrawer()">Close</button></div>';
  else h+='<div style="display:flex;gap:10px"><button class="dbtn" onclick="requestEdit(\''+esc(a.code)+'\')">✏️ Request an edit</button><button class="dbtn ghost" onclick="closeDrawer()">Close</button></div>';
  // request history
  var rq=r.requests||[];
  if(rq.length)h+='<div class="dsec" style="margin-top:22px"><h4>Edit requests</h4>'+rq.map(function(q){return '<div class="reqitem"><div class="rq">'+esc(q.field||'General')+' · <span style="color:'+(q.status==='pending'?'var(--amber)':'var(--green)')+'">'+esc(q.status)+'</span></div><div class="rm">'+esc(q.note||'')+' — '+esc(q.by_name||q.by_code)+'</div></div>';}).join('')+'</div>';
  h+='</div>';
  $('drawer').innerHTML=h;
}
function val(id){var e=$(id);return e?(e.value||'').trim():undefined;}
function saveAgent(code){
  var b=auth({action:'agent_update',code:code,first_name:val('e_first'),last_name:val('e_last'),phone:val('e_phone'),email:val('e_email'),state:val('e_state'),ica_date:val('e_ica'),license_type:val('e_ltype'),license_number:val('e_lnum'),license_status:val('e_lstat'),ops_notes:val('e_notes')});
  api(b).then(function(r){if(!r||!r.ok){toast((r&&r.error)||'Save failed');return;}toast('Saved ✓');closeDrawer();loadTracker();});
}
function requestEdit(code){
  var field=prompt('Which field needs updating? (e.g. State, License type, Phone)');if(field===null)return;
  var note=prompt('What should it be changed to / what’s the request?');if(note===null)return;
  api({action:'edit_request',by_code:OPS.code,by_name:OPS.name,code:code,field:field,note:note}).then(function(r){
    if(!r||!r.ok){toast((r&&r.error)||'Could not send');return;}toast('Edit request sent to Operations ✓');closeDrawer();
  });
}

/* ---- requests queue (ops) ---- */
function openRequests(){
  $('drawer').innerHTML='<div class="dbody"><div class="spin">Loading…</div></div>';$('ov').classList.add('on');
  api(auth({action:'requests'})).then(function(r){
    var reqs=(r&&r.requests)||[];var pend=reqs.filter(function(x){return x.status==='pending';});
    var h='<div class="dhd"><div><h3>Edit requests</h3><div class="sub">'+pend.length+' pending</div></div><button class="x" onclick="closeDrawer()">✕</button></div><div class="dbody">';
    if(!reqs.length)h+='<div class="empty">No edit requests yet.</div>';
    else h+=reqs.map(function(q){return '<div class="reqitem"><div class="rq">'+esc(q.agent_name)+' — '+esc(q.field||'General')+'</div><div class="rm">'+esc(q.note||'')+'</div><div class="rm">by '+esc(q.by_name||q.by_code)+' · '+esc((q.by_role||'').toUpperCase())+' · <span style="color:'+(q.status==='pending'?'var(--amber)':'var(--green)')+';font-weight:800">'+esc(q.status)+'</span></div>'+(q.status==='pending'?('<div class="ra"><button style="background:var(--green);color:#fff" onclick="openAgent(\''+esc(q.agent_code)+'\')">Open agent</button><button style="background:var(--green);color:#fff" onclick="resolveReq(\''+q.id+'\',\'applied\')">Mark applied</button><button style="background:var(--panel2);color:var(--ink2);border:1px solid var(--line2)" onclick="resolveReq(\''+q.id+'\',\'dismissed\')">Dismiss</button></div>'):'')+'</div>';}).join('');
    h+='</div>';$('drawer').innerHTML=h;
  });
}
function resolveReq(id,status){
  api(auth({action:'resolve_request',id:id,status:status})).then(function(r){if(!r||!r.ok){toast((r&&r.error)||'Failed');return;}toast('Request '+status);openRequests();loadTracker();});
}

$('ov').addEventListener('click',function(e){if(e.target===this)closeDrawer();});
(function(){
  try{var s=sessionStorage.getItem('tsfg_ops');if(s){OPS=JSON.parse(s);if(OPS&&OPS.code){showApp();return;}}}catch(e){}
  var qc='',qn='';
  try{var q=new URLSearchParams(location.search);qc=q.get('code')||'';qn=q.get('name')||'';}catch(e){}
  // fall back to the broker session so MDs/EMDs auto-view without re-logging in
  if(!qc){try{qc=localStorage.getItem('tsfg_code')||'';qn=localStorage.getItem('tsfg_name')||'';}catch(e){}}
  if(qc)$('gCode').value=qc;if(qn)$('gName').value=qn;
  if(qc&&qn){ // silent auto-login attempt; stay on the gate (pre-filled) if it fails
    api({action:'ops_login',code:qc,name:qn}).then(function(r){
      if(r&&r.ok){OPS={code:r.ops.code,name:r.ops.name,title:r.ops.title,role:r.role,can_edit:r.can_edit,baseshops:r.ops.baseshops||[]};try{sessionStorage.setItem('tsfg_ops',JSON.stringify(OPS));}catch(e){}showApp();}
    }).catch(function(){});
  }
})();
</script>
</body>
