<!doctype html>
<!-- ops tracker · rebuild nudge 1 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Operations Tracker — The Standard Financial Group</title>
<style>
:root{
  --bg:#f5f5f7;--panel:#fff;--panel2:#fbfbfd;--ink:#1d1d1f;--ink2:#6e6e73;--ink3:#8e8e93;
  --line:#ececf0;--line2:#e3e3e8;--accent:#5b6cff;--gold:#c99a2e;--gold-dp:#8a6d1f;--gold-br:#b8891f;
  --green:#1a9c52;--red:#d0392b;--amber:#b7791f;--shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);
  --shadow:0 2px 8px rgba(0,0,0,.05),0 14px 40px rgba(0,0,0,.07);--shadow-lg:0 24px 60px rgba(0,0,0,.16);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;--goldsoft:rgba(201,154,46,.12);
}
[data-theme="dark"]{--bg:#0a0a0c;--panel:#161618;--panel2:#1c1c1f;--ink:#f5f5f7;--ink2:#a1a1a8;--ink3:#77777e;--line:#26262a;--line2:#2e2e33;--accent:#7c8bff;--gold:#e6c260;--gold-br:#e6c260;--goldsoft:rgba(230,194,96,.12);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.gate::before,.gate::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.gate::before{width:440px;height:440px;background:radial-gradient(circle,var(--gold),transparent 70%);top:-140px;right:-90px;opacity:.32}
.gate::after{width:380px;height:380px;background:radial-gradient(circle,#8b9bff,transparent 70%);bottom:-130px;left:-70px;opacity:.4}
.gate-card{position:relative;width:100%;max-width:410px;background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lg);padding:36px 32px;text-align:center}
.gate-badge{width:56px;height:56px;border-radius:15px;margin:0 auto 15px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));display:flex;align-items:center;justify-content:center;font-size:26px}
.gate-card h1{font-size:22px;font-weight:800;margin:0 0 3px;letter-spacing:-.02em}
.gate-card p{font-size:13.5px;color:var(--ink2);margin:0 0 22px}
.gate-card input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:15px;outline:none;margin-bottom:11px}
.gate-card input:focus{border-color:var(--gold)}
.gbtn{width:100%;border:none;padding:13px;border-radius:12px;font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff;cursor:pointer;font-family:inherit;margin-top:4px}
.gmsg{font-size:13px;font-weight:700;color:var(--red);margin-top:12px;min-height:16px}
.ghint{font-size:11.5px;color:var(--ink3);margin-top:14px;line-height:1.5}
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:13px 22px;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(1.6) blur(14px);border-bottom:1px solid var(--line);flex-wrap:wrap}
.top .bdot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-dp));display:flex;align-items:center;justify-content:center;font-size:15px}
.top h1{font-size:15.5px;font-weight:800;margin:0;letter-spacing:-.02em}
.top .who{font-size:12px;color:var(--ink3);font-weight:600}
.rolechip{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:7px}
.rolechip.ops{background:var(--goldsoft);color:var(--gold-br)}
.rolechip.view{background:rgba(91,108,255,.12);color:var(--accent)}
.sp{margin-left:auto}
.iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);cursor:pointer;font-size:15px}
.signout{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);font-weight:700;font-size:13px;padding:8px 13px;border-radius:10px;cursor:pointer}
.bell{position:relative}
.bell .badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--bg)}
.bell.ring{animation:bellring .6s ease}
@keyframes bellring{0%,100%{transform:rotate(0)}20%{transform:rotate(-16deg)}40%{transform:rotate(13deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(4deg)}}
.wrap{max-width:1240px;margin:0 auto;padding:20px 22px 90px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{border:1px solid var(--line);border-radius:14px;padding:15px;background:linear-gradient(135deg,var(--goldsoft),var(--panel));box-shadow:var(--shadow-sm)}
.stat .n{font-size:23px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.stat .l{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.reqbanner{border:1.5px solid var(--gold-dp);background:var(--goldsoft);border-radius:14px;padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13.5px;font-weight:700}
.reqbanner button{margin-left:auto;border:none;background:var(--gold);color:#fff;font-weight:800;font-size:12.5px;padding:8px 14px;border-radius:9px;cursor:pointer;font-family:inherit}
.togglebar{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:13px;padding:4px;gap:3px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
.tgl{border:none;background:none;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--ink3);padding:10px 18px;border-radius:10px;cursor:pointer;white-space:nowrap}
.tgl.on{background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff}
.tglrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.searchbar{flex:1;min-width:160px;max-width:280px;padding:10px 13px;border:1.5px solid var(--line2);border-radius:11px;background:var(--panel);color:var(--ink);font-size:14px;outline:none;font-family:inherit}
.addbtn{border:none;background:var(--accent);color:#fff;font-weight:800;font-size:13px;padding:10px 15px;border-radius:11px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.resetcols{border:1px solid var(--line2);background:var(--panel);color:var(--ink3);font-weight:700;font-size:12px;padding:9px 12px;border-radius:10px;cursor:pointer;font-family:inherit}
.tablewrap{border:1px solid var(--line);border-radius:15px;overflow:auto;max-height:72vh;background:var(--panel);box-shadow:var(--shadow-sm)}
.cc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.cc-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.cc-2col{grid-template-columns:1fr}}
.cc-panel{border:1px solid var(--line);border-radius:15px;background:var(--panel);padding:16px 18px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.cc-panel h3{margin:0 0 13px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-br)}
.bar-row{display:flex;align-items:center;gap:11px;margin-bottom:8px;font-size:12.5px}
.bar-row .bl{width:160px;flex:0 0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.bar-row .bt{flex:1;height:16px;border-radius:6px;background:var(--line);overflow:hidden}
.bar-row .bt span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e6c874);border-radius:6px}
.bar-row .bv{width:46px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}
.trend{display:flex;align-items:flex-end;gap:6px;height:104px;padding-top:16px}
.trend .tb{background:linear-gradient(180deg,var(--accent),#8b9bff);border-radius:5px 5px 0 0;position:relative}
.trend .tb .tv{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:10px;font-weight:800;color:var(--ink2)}
.trend .tl{font-size:9.5px;color:var(--ink3);text-align:center;margin-top:5px;white-space:nowrap}
.feedrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.feedrow:last-child{border-bottom:none}
.feedrow .fd{font-weight:800;font-size:12.5px;min-width:120px;flex:0 0 auto}
.feedrow .fn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptable{width:100%;border-collapse:collapse;font-size:13px;min-width:960px;table-layout:auto}
.ptable th{position:sticky;top:0;background:var(--panel2);color:var(--gold-br);text-align:left;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:12px 18px;border-bottom:1.5px solid var(--line2);white-space:nowrap;z-index:1;user-select:none}
.ptable th.dragover{background:var(--goldsoft);box-shadow:inset 3px 0 0 var(--gold)}
.thin{display:flex;align-items:center;gap:7px}
.thin.r{justify-content:flex-end}
.grip{cursor:grab;color:var(--ink3);font-size:12px;opacity:.6;letter-spacing:-2px}
.grip:active{cursor:grabbing}
.thlbl{cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.thlbl:hover{color:var(--ink)}
.sarrow{opacity:.4;font-size:9px}
.sarrow.on{opacity:1;color:var(--gold)}
.ptable td{padding:11px 18px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap;line-height:1.4}
.ptable td,.ptable th{max-width:300px;border-right:1px solid var(--line)}
.ptable td:last-child,.ptable th:last-child{border-right:none}
.ptable tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--panel2) 55%,var(--panel))}
.ptable tbody tr:hover td{background:var(--panel2)}
.twoline{display:flex;flex-direction:column;gap:1px;line-height:1.3;min-width:0;max-width:100%}
.twoline .tl1,.twoline .sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;max-width:100%}
.namebtn{background:none;border:none;font-family:inherit;font-weight:800;font-size:13.5px;color:var(--accent);cursor:pointer;padding:0;text-align:left;letter-spacing:-.01em}
.namebtn:hover{text-decoration:underline}
.sub{font-size:11px;color:var(--ink3);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thin{flex-wrap:nowrap}
.pill{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:7px;white-space:nowrap}
.pill.lic{background:rgba(26,156,82,.14);color:var(--green)}
.pill.exam{background:rgba(183,121,31,.16);color:var(--amber)}
.pill.pre{background:rgba(91,108,255,.13);color:var(--accent)}
.pill.none{background:var(--panel2);color:var(--ink3);border:1px solid var(--line2)}
.cellin{width:100%;min-width:100px;border:1px solid transparent;border-radius:7px;padding:6px 8px;font-size:12.5px;background:transparent;color:var(--ink);outline:none;font-family:inherit}
.cellin:hover{border-color:var(--line2);background:var(--panel)}
.cellin:focus{border-color:var(--gold);background:var(--panel)}
.cellin.saved{border-color:var(--green);background:rgba(26,156,82,.08)}
select.cellin{cursor:pointer;min-width:140px;-webkit-appearance:none;appearance:none;padding-right:26px;text-overflow:ellipsis;white-space:nowrap;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%238e8e93' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 8px center;background-size:10px 6px}
.cellchk{width:18px;height:18px;cursor:pointer;accent-color:var(--gold);margin:0;display:block}
.cpill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;line-height:1.5;white-space:nowrap}
.tybtn{flex:1;padding:9px 6px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;opacity:.65;transition:.12s}
.tybtn.on{border-color:var(--gold);background:var(--gold-soft,rgba(201,154,46,.14));color:var(--gold);opacity:1}
.mbar{height:7px;border-radius:999px;background:var(--line);overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
.mbar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e6c874)}
.ms{display:inline-flex;gap:4px}.mschip{font-size:13px;opacity:.28;filter:grayscale(1)}.mschip.on{opacity:1;filter:none}
.miss{color:var(--red);font-weight:800}
.spin,.empty{padding:30px;text-align:center;color:var(--ink3);font-size:14px;font-weight:600}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:26px}
.tile{display:block;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:15px;box-shadow:var(--shadow-sm)}
.tile:hover{transform:translateY(-2px)}.tile .ti{font-size:20px}.tile .tt{font-weight:800;font-size:14px;margin-top:7px}.tile .td{font-size:11.5px;color:var(--ink3);margin-top:2px}
/* drawer */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.44);display:none;justify-content:flex-end;z-index:60}
.ov.on{display:flex}
.drawer{width:100%;max-width:560px;background:var(--panel);height:100%;overflow:auto;box-shadow:var(--shadow-lg)}
.dhd{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;gap:12px;z-index:2}
.dhd h3{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
.dhd .x{margin-left:auto;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;flex:0 0 auto}
.dbody{padding:18px 22px 40px}
.dsec{margin-bottom:22px}
.dsec h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-br);margin:0 0 11px;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:11px}.fg label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--line2);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--panel);color:var(--ink);outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg input[readonly],.fg textarea[readonly]{background:var(--panel2);color:var(--ink2)}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.dbtn{border:none;background:linear-gradient(135deg,var(--gold),var(--gold-dp));color:#fff;font-weight:800;font-size:14px;padding:11px 18px;border-radius:11px;cursor:pointer;font-family:inherit}
.dbtn.ghost{background:var(--panel);color:var(--ink2);border:1px solid var(--line2)}
.dbtn.blue{background:var(--accent)}
.polrow{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;background:var(--panel2)}
.polrow .pt{font-weight:800;font-size:13.5px}.polrow .pm{font-size:12px;color:var(--ink3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
/* notes log */
.note{border-left:3px solid var(--gold);background:var(--panel2);border-radius:0 10px 10px 0;padding:10px 13px;margin-bottom:9px}
.note.leader{border-left-color:var(--accent)}
.note .ntx{font-size:13.5px;font-weight:600}
.note.leader .ntx{color:var(--accent)}
.note .nmeta{font-size:11px;color:var(--ink3);margin-top:5px;font-weight:700}
.note .rc{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:6px;margin-right:6px}
.note .rc.ops{background:var(--goldsoft);color:var(--gold-br)}
.note .rc.leader{background:rgba(91,108,255,.13);color:var(--accent)}
.reqitem{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;background:var(--panel2)}
.reqitem .rq{font-weight:700;font-size:13px}.reqitem .rm{font-size:11.5px;color:var(--ink3);margin-top:3px}
.reqitem .ra{display:flex;gap:7px;margin-top:9px}.reqitem .ra button{border:none;font-weight:800;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.ntf{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;background:var(--panel2)}
.ntf.new{border-color:var(--gold-dp);background:var(--goldsoft)}
.ntf .nt{font-weight:800;font-size:14px}.ntf .nm{font-size:12.5px;color:var(--ink3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.ntf a.zoom{display:inline-block;margin-top:9px;font-size:12.5px;font-weight:800;color:#fff;background:var(--accent);padding:7px 13px;border-radius:9px;text-decoration:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:80}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hide{display:none!important}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-badge">🛡️</div>
    <h1>Operations Tracker</h1>
    <p>Licensing · New Business · Fast Start</p>
    <input id="gName" placeholder="Your name" autocomplete="name">
    <input id="gCode" placeholder="Operations code (0000–4) or your GFI code" autocomplete="off">
    <button class="gbtn" id="gBtn">Enter →</button>
    <div class="gmsg" id="gMsg"></div>
    <div class="ghint"><b>Operations staff</b> (0000–0004) view &amp; edit everything.<br><b>MDs &amp; EMDs</b> sign in with their GFI code to view, add notes &amp; request edits.</div>
    <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--ink3,#8e8e93);font-size:13px;font-weight:600;text-decoration:none">← Back to Dashboard</a>
  </div>
</div>

<div id="app" class="hide">
  <div class="top">
    <div class="bdot">🛡️</div>
    <div><h1>Operations Tracker</h1><div class="who" id="whoLbl"></div></div>
    <span id="roleChip"></span>
    <a class="signout" href="index.html" title="Back to Dashboard" style="text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-left:auto">← Dashboard</a>
    <button class="iconbtn bell hide" id="bellBtn" onclick="openNotif()" title="Booking notifications">🔔<span class="badge hide" id="bellBadge">0</span></button>
    <button class="iconbtn" onclick="toggleTheme()" title="Theme">◐</button>
    <button class="signout" onclick="signOut()">Sign out</button>
  </div>
  <div class="wrap">
    <div class="stat-grid" id="statGrid"></div>
    <div id="reqBanner"></div>
    <div class="tglrow">
      <div class="togglebar">
        <button class="tgl on" id="tg_licensing" onclick="setTab('licensing')">🎫 Licensing</button>
        <button class="tgl" id="tg_newbiz" onclick="setTab('newbiz')">💰 New Business</button>
        <button class="tgl" id="tg_faststart" onclick="setTab('faststart')">🚀 Fast Start</button>
        <button class="tgl" id="tg_appointed" onclick="setTab('appointed')">✅ Licensed &amp; Appointed</button>
        <button class="tgl" id="tg_inforce" onclick="setTab('inforce')">🟢 In Force</button>
        <button class="tgl" id="tg_gfi" onclick="setTab('gfi')">🎟️ GFI Tickets</button>
        <button class="tgl" id="tg_bookings" onclick="setTab('bookings')">📅 Bookings</button>
        <button class="tgl" id="tg_teamhub" onclick="setTab('teamhub')">💬 Team Hub</button>
      </div>
      <button class="addbtn hide" id="addBtn" onclick="openAddMenu()">＋ Add</button>
      <input class="searchbar" id="search" placeholder="Search…" oninput="onSearch()">
    </div>
    <div class="tablewrap" id="tableWrap"><div id="tableHost"><div class="spin">Loading tracker…</div></div></div>
    <div id="bookingsHost" class="hide"></div>
    <div id="newbizHost" class="hide"></div>
    <div id="inforceHost" class="hide"></div>
    <div id="teamhubHost" class="hide"></div>
    <div id="opsTiles"></div>
  </div>
</div>

<div class="ov" id="ov"><div class="drawer" id="drawer"></div></div>
<div class="toast" id="toast"></div>
<datalist id="dl_license_type"></datalist>
<datalist id="dl_state"></datalist>
<datalist id="dl_base"><option value="SUMMIT"><option value="GRIND"><option value="TITANS"><option value="STANDARD"></datalist>

<script>
var OD="https://bmfqxtocxkjhsgfnndlo.supabase.co/functions/v1/ops-directory";

    var badge=$('bellBadge');if(!badge)return;
    if(fresh.length){badge.textContent=fresh.length>9?'9+':String(fresh.length);badge.classList.remove('hide');var bl=$('bellBtn');if(bl){bl.classList.remove('ring');void bl.offsetWidth;bl.classList.add('ring');}}else badge.classList.add('hide');
    fresh.forEach(function(b){if(NOTIF.notified[b.id])return;NOTIF.notified[b.id]=1;try{if(window.Notification&&Notification.permission==='granted')new Notification('New Operations booking',{body:(b.agent||'Someone')+' booked you — '+prettyDate(b.date)+' '+(b.time||'')+' PT'});}catch(e){}});
  }).catch(function(){});
}
function openNotif(){
  var list=NOTIF.list;var seen=notifSeen();
  var h='<div class="dhd"><div><h3>Booking notifications</h3><div class="sub">People who booked you for a Zoom</div></div><button class="x" onclick="closeDrawer()">✕</button></div><div class="dbody">';
  h+=list.length?list.map(function(b){var isNew=b.created_at&&(!seen||b.created_at>seen);return '<div class="ntf'+(isNew?' new':'')+'"><div class="nt">'+(isNew?'🔵 ':'')+esc(b.agent||'Someone')+' booked you</div><div class="nm"><span>📅 '+esc(prettyDate(b.date))+' · '+esc(b.time||'')+' PT</span><span>'+esc(b.category||'Operations')+'</span>'+(b.conf?('<span>'+esc(b.conf)+'</span>'):'')+'</div>'+(b.notes?('<div class="nm">“'+esc(b.notes)+'”</div>'):'')+(b.meeting_link?('<a class="zoom" href="'+esc(b.meeting_link)+'" target="_blank" rel="noopener">Join Zoom →</a>'):'')+'</div>';}).join(''):'<div class="empty">No bookings yet. When an agent books you from the Scheduler → Base Ops, it shows up here.</div>';
  h+='</div>';$('drawer').innerHTML=h;$('ov').classList.add('on');
  var newest=list.reduce(function(m,b){return (b.created_at&&b.created_at>m)?b.created_at:m;},seen);
  try{localStorage.setItem(notifSeenKey(),newest||new Date().toISOString());}catch(e){}
  var badge=$('bellBadge');if(badge)badge.classList.add('hide');
}

$('ov').addEventListener('click',function(e){if(e.target===this)closeDrawer();});
(function(){
  try{var s=sessionStorage.getItem('tsfg_ops');if(s){OPS=JSON.parse(s);if(OPS&&OPS.code){showApp();return;}}}catch(e){}
  var qc='',qn='';try{var q=new URLSearchParams(location.search);qc=q.get('code')||'';qn=q.get('name')||'';}catch(e){}
  if(!qc){try{qc=localStorage.getItem('tsfg_code')||'';qn=localStorage.getItem('tsfg_name')||'';}catch(e){}}
  if(qc)$('gCode').value=qc;if(qn)$('gName').value=qn;
  if(qc&&qn){api({action:'ops_login',code:qc,name:qn}).then(function(r){if(r&&r.ok){OPS={code:r.ops.code,name:r.ops.name,title:r.ops.title,role:r.role,can_edit:r.can_edit,baseshops:r.ops.baseshops||[]};try{sessionStorage.setItem('tsfg_ops',JSON.stringify(OPS));}catch(e){}showApp();}}).catch(function(){});}
})();
</script>
