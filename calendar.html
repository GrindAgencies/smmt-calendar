<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scheduler — The Standard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--panel:#fff;--panel2:#fbfbfd;--ink:#1d1d1f;--ink2:#6e6e73;--ink3:#8e8e93;
  --line:#ececf0;--line2:#e3e3e8;--accent:#5b6cff;--accent2:#4f46e5;--accent-soft:rgba(91,108,255,.10);
  --green:#34c759;--green-soft:rgba(52,199,89,.13);--gold:#c99a2e;--gold-soft:rgba(201,154,46,.14);
  --red:#ff3b30;--orange:#ff9f0a;--side:248px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);--shadow:0 2px 8px rgba(0,0,0,.05),0 14px 40px rgba(0,0,0,.07);
  --shadow-lg:0 24px 60px rgba(0,0,0,.16);--font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
}
[data-theme="dark"]{--bg:#0a0a0c;--panel:#161618;--panel2:#1c1c1f;--ink:#f5f5f7;--ink2:#a1a1a8;--ink3:#77777e;--line:#26262a;--line2:#2e2e33;--accent:#7c8bff;--accent-soft:rgba(124,139,255,.14);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
button,input,select{font-family:inherit;}button{cursor:pointer;}
a{color:inherit;text-decoration:none;}.hide{display:none!important;}
.side{position:fixed;left:0;top:0;height:100vh;width:var(--side);background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:3px;padding:16px 12px;z-index:60;overflow-y:auto;transition:transform .24s;}
.side .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px;}
.side .brand img{width:32px;height:32px;border-radius:9px;object-fit:cover;}
.side .brand .bn{font-weight:800;font-size:16px;}.side .brand .bn b{color:var(--accent);}
.slink{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;color:var(--ink2);font-weight:600;font-size:14px;white-space:nowrap;}
.slink svg{width:20px;height:20px;flex:0 0 auto;}
.slink:hover{background:var(--bg);color:var(--ink);}.slink.on{background:var(--accent-soft);color:var(--accent);}
.sfoot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line);}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55;}body.drawer .scrim{display:block;}
.top{position:sticky;top:0;z-index:40;height:60px;display:flex;align-items:center;gap:14px;padding:0 24px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);}
.menu{display:none;width:38px;height:38px;border-radius:11px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);align-items:center;justify-content:center;}
.gsearch{flex:1;max-width:520px;display:flex;align-items:center;gap:9px;padding:10px 14px;border:1px solid var(--line2);border-radius:13px;background:var(--panel);box-shadow:var(--shadow-sm);cursor:text;}
.gsearch svg{width:16px;height:16px;color:var(--ink3);}
.gsearch input{border:none;background:none;outline:none;color:var(--ink);font-size:14px;width:100%;}
.gsearch kbd{font-size:11px;color:var(--ink3);border:1px solid var(--line2);border-radius:6px;padding:2px 6px;background:var(--bg);}
.qbtn{margin-left:auto;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:11px 18px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 20px var(--accent-soft);white-space:nowrap;}
.qbtn:hover{background:var(--accent2);}
.wrap{padding-left:var(--side);}
.content{max-width:1240px;margin:0 auto;padding:26px 30px 70px;}
@media(max-width:900px){.wrap{padding-left:0;}.side{transform:translateX(-100%);box-shadow:var(--shadow-lg);}body.drawer .side{transform:none;}.menu{display:flex;}.content{padding:18px 16px 60px;}}
.tabs{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:4px;gap:2px;margin-bottom:22px;box-shadow:var(--shadow-sm);flex-wrap:wrap;}
.tabs button{border:none;background:none;padding:9px 16px;border-radius:10px;font-size:13.5px;font-weight:700;color:var(--ink2);}
.tabs button.on{background:var(--accent);color:#fff;}
.hero{background:linear-gradient(135deg,var(--accent),#7c8bff);border-radius:24px;padding:30px 32px;color:#fff;box-shadow:0 18px 44px var(--accent-soft);margin-bottom:22px;position:relative;overflow:hidden;}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:0 0 6px;}
.hero p{margin:0 0 20px;opacity:.92;font-size:15px;font-weight:500;}
.hero .hbtn{border:none;background:#fff;color:var(--accent);font-weight:800;font-size:15px;padding:14px 24px;border-radius:14px;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 26px rgba(0,0,0,.18);}
.hero .hbtn:hover{transform:translateY(-1px);}
.sec{margin-bottom:24px;}
.sech{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px;}
.sech h2{font-size:15px;font-weight:800;letter-spacing:-.01em;margin:0;}
.sech a{font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;}
.grid{display:grid;gap:14px;}
.g3{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));}
.g4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow-sm);}
.tile .tl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);}
.tile .tv{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums;}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow-sm);transition:.16s;cursor:pointer;position:relative;}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent);}
.tcard .th{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
.tav{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:17px;flex:0 0 auto;}
.tcard .tn{font-weight:800;font-size:16px;}
.tcard .tr{font-size:12.5px;color:var(--ink3);}
.tstat{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;}
.tstat.on{background:var(--green-soft);color:#1a9c52;}.tstat.off{background:var(--bg);color:var(--ink3);}
.tstat .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.tmeta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.tmeta .m{font-size:11.5px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 9px;}
.tcard .book{margin-top:14px;width:100%;border:none;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:13.5px;padding:11px;border-radius:12px;}
.tcard .book:hover{background:var(--accent);color:#fff;}
.badge{position:absolute;top:16px;right:16px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 9px;border-radius:999px;background:var(--gold-soft);color:var(--gold);}
.bstep{margin-bottom:22px;}
.bstep .lbl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:11px;}
.dstrip{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 8px;}
.dpill{flex:0 0 auto;width:62px;text-align:center;border:1px solid var(--line2);background:var(--panel);border-radius:14px;padding:11px 0;box-shadow:var(--shadow-sm);transition:.14s;}
.dpill:hover{border-color:var(--accent);}
.dpill.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 8px 18px var(--accent-soft);}
.dpill .dw{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;}
.dpill .dd{font-size:22px;font-weight:800;line-height:1.1;}
.dpill .dm{font-size:10px;opacity:.7;}
.dpill.today .dd{color:var(--accent);}.dpill.on.today .dd{color:#fff;}
.tchips{display:flex;flex-wrap:wrap;gap:10px;}
.tchip{border:1px solid var(--line2);background:var(--panel);border-radius:12px;padding:11px 16px;font-weight:700;font-size:14px;color:var(--ink);box-shadow:var(--shadow-sm);transition:.14s;font-variant-numeric:tabular-nums;}
.tchip:hover{border-color:var(--accent);}
.tchip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.tchip .cnt{font-size:11px;color:var(--ink3);margin-left:6px;font-weight:600;}
.tchip.on .cnt{color:rgba(255,255,255,.8);}
.empty{color:var(--ink3);font-size:14px;padding:18px;text-align:center;border:1px dashed var(--line2);border-radius:14px;}
.psub{border:none;background:none;padding:8px 15px;border-radius:9px;font-size:13px;font-weight:700;color:var(--ink2);font-family:inherit;cursor:pointer;transition:.15s;}
.psub.on{background:var(--accent);color:#fff;}
.emb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:12px;}
.emb-cell{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:12px 8px;border:1px solid var(--line);border-radius:16px;background:var(--panel);transition:transform .18s,box-shadow .18s,border-color .18s;cursor:pointer;}
.emb-cell:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.10);border-color:var(--line2);}
.emb-cell:not(.earned){background:var(--panel2);}
.emb-badge{position:relative;line-height:0;}
.emb-badge.active::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 14px rgba(201,154,46,.5);animation:embglow 2.2s ease-in-out infinite;}
@keyframes embglow{0%,100%{opacity:.6;}50%{opacity:1;}}
.emb-badge svg{transition:transform .2s;}
.emb-cell:hover .emb-badge svg{transform:scale(1.07) rotate(-2deg);}
.emb-badge.active svg{animation:embbob 3.2s ease-in-out infinite;}
@keyframes embbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.emb-name{font-size:12px;font-weight:800;line-height:1.15;}
.emb-desc{font-size:10.5px;color:var(--ink3);font-weight:600;line-height:1.2;}
.emb-cell.earned .emb-desc{color:var(--accent);}
@media (prefers-reduced-motion:reduce){.emb-badge.active::after,.emb-badge.active svg{animation:none;}.emb-cell:hover .emb-badge svg{transform:none;}}
.catrow{display:flex;gap:9px;flex-wrap:wrap;}
.cat{border:1px solid var(--line2);background:var(--panel);border-radius:12px;padding:10px 15px;font-weight:600;font-size:13.5px;color:var(--ink2);}
.cat.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.trow{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--shadow-sm);margin-bottom:10px;}
.trow .ti{width:44px;height:44px;border-radius:12px;background:var(--accent-soft);color:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto;font-weight:800;line-height:1;}
.trow .ti .h{font-size:15px;}.trow .ti .ap{font-size:9px;font-weight:700;}
.trow .tt{font-weight:700;font-size:14.5px;}
.trow .ts{font-size:12.5px;color:var(--ink3);}
.trow .zj{margin-left:auto;border:1px solid var(--line2);background:var(--panel);color:var(--accent);font-weight:700;font-size:12.5px;padding:9px 13px;border-radius:10px;white-space:nowrap;}
.trow .zj:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.apt{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--shadow-sm);margin-bottom:10px;}
.apt .conf{font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:.03em;}
.apt .x{margin-left:auto;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);font-weight:600;font-size:12px;padding:8px 12px;border-radius:10px;}
.apt .x.can:hover{border-color:var(--red);color:var(--red);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:80;display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
@media(min-width:640px){.ov{align-items:center;}}
.drawer{background:var(--panel);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:26px;box-shadow:var(--shadow-lg);animation:up .3s cubic-bezier(.2,.8,.2,1);}
@media(min-width:640px){.drawer{border-radius:24px;}}
@keyframes up{from{transform:translateY(30px);opacity:.6;}to{transform:none;opacity:1;}}
.drawer h3{font-size:20px;font-weight:800;margin:0 0 4px;letter-spacing:-.02em;}
.drawer .dsub{color:var(--ink2);font-size:14px;margin:0 0 18px;}
.confrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);}
.confrow .cl{font-size:12.5px;color:var(--ink3);font-weight:600;width:90px;}
.confrow .cv{font-weight:700;font-size:14.5px;}
.dact{display:flex;gap:11px;margin-top:22px;}
.dact button{flex:1;border-radius:13px;padding:14px;font-weight:800;font-size:15px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);}
.dact .go{flex:2;background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 8px 20px var(--accent-soft);}
.done{text-align:center;padding:14px 0;}
.done .chk{width:66px;height:66px;border-radius:50%;background:var(--green-soft);color:#1a9c52;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;}
.done .cnum{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.05em;margin-top:6px;}
.spot{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none;justify-content:center;padding-top:12vh;}
.spot.on{display:flex;}
.spotbox{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:600px;height:fit-content;max-height:70vh;box-shadow:var(--shadow-lg);overflow:hidden;}
.spotin{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--line);}
.spotin svg{width:19px;height:19px;color:var(--ink3);}
.spotin input{border:none;background:none;outline:none;font-size:17px;color:var(--ink);width:100%;}
.spotres{max-height:52vh;overflow-y:auto;padding:8px;}
.sres{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;cursor:pointer;}
.sres:hover,.sres.sel{background:var(--bg);}
.sres .si{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:0 0 auto;}
.sres .st{font-weight:700;font-size:14px;}.sres .ss{font-size:12px;color:var(--ink3);}
.sres .kind{margin-left:auto;font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--ink3);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:var(--shadow-lg);}
.toast.on{opacity:1;transform:translateX(-50%);}
.spin{text-align:center;color:var(--ink3);padding:40px;font-size:14px;}
.calgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;}
@media(max-width:880px){.calgrid{grid-template-columns:1fr;}}
.calday{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:96px;box-shadow:var(--shadow-sm);}
.calday.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.calhd{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line);}
.calw{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--ink3);}
.cald{font-size:16px;font-weight:800;}
.calday.today .cald{color:var(--accent);}
.calempty{color:var(--ink3);font-size:12px;text-align:center;padding:10px 0;}
.calev{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:12px;margin-bottom:6px;cursor:pointer;transition:.12s;line-height:1.35;}
.calev:hover{border-color:var(--accent);transform:translateY(-1px);}
.calev b{font-variant-numeric:tabular-nums;}
.calev .csub{font-size:11px;color:var(--ink3);margin-top:1px;}
.calev.caltr{background:var(--gold-soft);border-color:transparent;}
.cdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.calnav{border:1px solid var(--line2);background:var(--panel);border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;color:var(--ink2);cursor:pointer;}
.calnav:hover{border-color:var(--accent);color:var(--accent);}
.calx{position:absolute;top:4px;right:5px;font-size:11px;font-weight:800;color:var(--ink3);cursor:pointer;line-height:1;padding:2px 4px;border-radius:5px;}
.calx:hover{color:#fff;background:var(--red);}
.mdowrow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.mdow{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--ink3);text-align:center;}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.mcell{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:98px;padding:6px;cursor:pointer;transition:.12s;overflow:hidden;}
.mcell:hover{border-color:var(--accent);}
.mcell.out{background:var(--bg);opacity:.5;}
.mcell.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.mnum{font-size:13px;font-weight:800;margin-bottom:4px;}
.mcell.today .mnum{color:var(--accent);}
.mchip{font-size:10.5px;background:var(--bg);border-radius:5px;padding:2px 5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-variant-numeric:tabular-nums;}
.mchip:hover{background:var(--accent-soft);}
.mmore{font-size:10px;color:var(--ink3);font-weight:700;}
.dgrid{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow-sm);}
.drow{display:flex;border-bottom:1px solid var(--line);min-height:52px;}
.drow:last-child{border-bottom:none;}
.dhour{width:66px;flex:0 0 auto;padding:8px 10px;font-size:11px;color:var(--ink3);font-weight:700;border-right:1px solid var(--line);text-align:right;}
.dslot{flex:1;padding:6px 8px;cursor:pointer;}
.dslot:hover{background:var(--bg);}
.dev{background:var(--accent-soft);border-radius:6px;padding:5px 8px;font-size:12px;margin-bottom:4px;cursor:pointer;}
.dev .dsub{color:var(--ink3);font-size:11px;}
.hchip{border:1px solid var(--line2);background:var(--panel);color:var(--ink2);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:700;cursor:pointer;font-variant-numeric:tabular-nums;min-width:52px;text-align:center;}
.hchip:hover{border-color:var(--accent);}
.hchip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>
</head>
<body>
<div class="scrim" onclick="drawer(false)"></div>
<aside class="side" id="side"></aside>
<div class="wrap">
  <header class="top">
    <button class="menu" onclick="drawer(true)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="gsearch" onclick="openSpot()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="gsi" placeholder="Search trainers, appointments, trainings…" onfocus="openSpot()"><kbd>⌘K</kbd></div>
    <button class="qbtn" onclick="quickSchedule()"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Quick Schedule</button>

function todayStr(){return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles'}).format(new Date());}
function ymd(dt){return dt.toISOString().slice(0,10);}
function addDays(n){var d=new Date(todayStr()+'T12:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d;}
function wdOf(dstr){return new Date(dstr+'T12:00:00Z').getUTCDay();}
function prettyDate(dstr){return new Date(dstr+'T12:00:00Z').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'UTC'});}
function t2min(t){var m=/(\d+):(\d+)\s*(AM|PM)/i.exec(t);if(!m)return 0;var h=+m[1]%12;if(/PM/i.test(m[3]))h+=12;return h*60+ +m[2];}
function inRange(dstr,r){return r&&dstr>=r.start&&dstr<=r.end;}
function availTimesForTrainer(cft,dstr){
  if(cft.locked)return [];
  if(isClosureCli(dstr))return [];
  if((cft.lockouts||[]).some(function(r){return inRange(dstr,r);}))return [];
  if((cft.vacations||[]).some(function(r){return inRange(dstr,r);}))return [];
  if((cft.blackouts||[]).indexOf(dstr)>=0)return [];
  var key=DAYS[wdOf(dstr)];var slots=(cft.slots&&cft.slots[key])?cft.slots[key]:[];
  var taken=DAYBOOKED.filter(function(b){return b.trainer_name===cft.name;}).map(function(b){return b.time;});
  var out=slots.filter(function(t){return taken.indexOf(t)<0;});
  var busy=(cft.busy||[]).filter(function(b){return b.date===dstr;});
  if(busy.length)out=out.filter(function(t){var tm=t2min(t);return !busy.some(function(b){return (Number(b.s)||0) < tm+60 && (Number(b.e)||1440) > tm;});});
  var cut=schedCutoff();
  return out.filter(function(t){if(dstr>cut.date)return true;if(dstr<cut.date)return false;return t2min(t)>=cut.minutes;});
}
function allTimesForDate(dstr){var map={};bTr().forEach(function(c){availTimesForTrainer(c,dstr).forEach(function(t){map[t]=(map[t]||0)+1;});});
  return Object.keys(map).sort(function(a,b){return t2min(a)-t2min(b);}).map(function(t){return {time:t,count:map[t]};});}
function trainersAt(dstr,time){return bTr().filter(function(c){return availTimesForTrainer(c,dstr).indexOf(time)>=0;});}
function trainerAvailToday(c){return availTimesForTrainer(c,todayStr());}

function myTrainerProfile(){if(!TRAINERS||!TRAINERS.length)return null;var lname=(NAME||'').trim().toLowerCase();if(!lname)return null;return TRAINERS.filter(function(c){return c.name&&c.name.trim().toLowerCase()===lname;})[0]||null;}

function opsAll(){return TRAINERS.filter(isOps);}
function opsForMe(){var mine=(PROFILE&&Array.isArray(PROFILE.accessible_bases))?PROFILE.accessible_bases.map(function(b){return (b||'').toUpperCase();}):[];var myb=((PROFILE&&PROFILE.baseshop)||'').toUpperCase();return opsAll().filter(function(c){var bs=Array.isArray(c.baseshops)?c.baseshops:(c.baseshop?[c.baseshop]:[]);bs=bs.map(function(x){return (x||'').toUpperCase();});if(!bs.length)return true;if(myb&&bs.indexOf(myb)>=0)return true;for(var i=0;i<mine.length;i++)if(bs.indexOf(mine[i])>=0)return true;return false;});}
function myRole(){var me=myTrainerProfile();return me?((me.role||'').toUpperCase()):'';}
function isEmd(){return myRole()==='EMD';}

function isClosureCli(dstr){return (SCHED.closures||[]).some(function(cl){if(typeof cl==='string')return cl===dstr;if(cl&&cl.date)return cl.date===dstr;if(cl&&cl.start&&cl.end)return dstr>=cl.start&&dstr<=cl.end;return false;});}
function nowPTmin(){var f=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',hour:'2-digit',minute:'2-digit',hour12:false});var p={};f.formatToParts(new Date()).forEach(function(x){p[x.type]=x.value;});return (Number(p.hour)%24)*60+Number(p.minute);}
function schedCutoff(){var total=nowPTmin()+(Number(SCHED.min_notice_hours)||0)*60;var k=Math.floor(total/1440);return {date:ymd(addDays(k)),minutes:total-k*1440};}
function saveSched(payload,msg){payload.action='atlas_scheduler_config';payload.op='save';payload.code=CODE;
  fetch(AT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(r){
    if(!r||!r.ok){toast((r&&r.error)||'Save failed');return;}

  }).catch(function(){toast('Network error');});}
function addClosure(){var d=$('clNew')&&$('clNew').value;if(!d)return toast('Pick a date');var arr=(SCHED.closures||[]).slice();var has=arr.some(function(x){return x===d||(x&&x.date===d);});if(!has)arr.push(d);saveSched({closures:arr},'Closure added');}

    '<div style="'+_FST+'"><label style="'+_LST+'">Time (PT)</label><select id="ob_time" style="'+_IST+'"><option value="">Pick a date first</option></select></div>'+

function doOpsBook(encName){
  var name=decodeURIComponent(encName);var c=opsAll().filter(function(x){return x.name===name;})[0];
  var d=$('ob_date').value,t=$('ob_time').value;var msg=$('ob_msg'),btn=$('ob_btn');
  if(!d||!t){msg.style.color='var(--red)';msg.textContent='Pick a date and time.';return;}
  btn.disabled=true;msg.style.color='var(--ink3)';msg.textContent='Booking…';
  fetch(AT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'atlas_book',code:CODE,agent_name:NAME,trainer_name:name,trainer_calendly:(c&&c.calendly)||'',category:'Operations',date:d,time:t})}).then(function(r){return r.json();}).then(function(r){
    if(r&&r.taken){btn.disabled=false;msg.style.color='var(--red)';msg.textContent=r.error||'That time was just taken.';return;}
    if(!r||!r.ok){btn.disabled=false;msg.style.color='var(--red)';msg.textContent=(r&&r.error)||'Could not book.';return;}
    toast('Booked with '+name.split(' ')[0]+(r.pending?' — pending':''));$('bkOv').classList.remove('on');loadMyTrainer(function(){loadMy(function(){render();});});

  var h='<div class="sec"><div style="display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="width:74px;height:74px;border-radius:50%;overflow:hidden;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;flex:0 0 auto">'+av+'</div><div style="flex:1;min-width:140px"><div style="font-weight:800;font-size:17px">'+esc(full)+'</div><div style="font-size:12.5px;color:var(--ink3)">'+esc(p.title||(me?roleLabel(me.role):''))+'</div><label style="display:inline-block;margin-top:8px;font-size:12.5px;font-weight:700;color:var(--accent);cursor:pointer">📷 Upload photo<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this)"></label></div>'+actBadge+'</div></div>';
  h+='<div class="sec"><div class="sech"><h2>Personal details</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)">'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:150px"><label style="'+_LST+'">First name</label><input id="pf_first" style="'+_IST+'" value="'+esc(p.first_name||'')+'"></div><div style="flex:1;min-width:150px"><label style="'+_LST+'">Last name</label><input id="pf_last" style="'+_IST+'" value="'+esc(p.last_name||'')+'"></div></div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px"><div style="flex:1;min-width:150px"><label style="'+_LST+'">Mobile phone <span style="color:var(--ink3);font-weight:400">· your SMS source</span></label><input id="pf_phone" style="'+_IST+'" value="'+esc(p.phone||'')+'" placeholder="(555) 555-1234"></div><div style="flex:1;min-width:150px"><label style="'+_LST+'">Email / Gmail <span style="color:var(--ink3);font-weight:400">· your email source</span></label><input id="pf_email" type="email" style="'+_IST+'" value="'+esc(p.email||'')+'" placeholder="you@gmail.com"></div></div>'+
    '<button style="border:none;margin-top:12px;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="saveProfile()">Save details</button></div></div>';
  h+='<div class="sec"><div class="sech"><h2>Calendar Sync</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)">'+
    '<div style="font-size:13px;color:var(--ink2);margin-bottom:12px">Connect your Google &amp; Apple calendars so your existing appointments — <b>including anything still in Calendly</b> — automatically block those times. No more double-bookings.</div>'+
    '<div id="calSyncStatus" style="font-size:12.5px;font-weight:700;color:var(--ink3);margin-bottom:12px">Checking sync status…</div>'+
    '<button style="border:none;padding:11px 18px;border-radius:11px;font-weight:800;font-size:13.5px;background:var(--accent);color:#fff;cursor:pointer" onclick="openCalSync()">🔗 Set up calendar sync</button>'+
    '<div style="font-size:11.5px;color:var(--ink3);margin-top:10px">Full two-way Google sync + sending booking emails from your Gmail turns on once the Workspace connection is finished — this busy-blocking works today.</div>'+
    '<div style="'+_FST+';margin-top:14px"><label style="'+_LST+'">Calendly link <span style="color:var(--ink3);font-weight:400">· optional, being replaced</span></label><input id="pf_cal" style="'+_IST+'" value="'+esc(p.calendly||'')+'" placeholder="https://calendly.com/you"></div>'+
    '</div></div>';
  if(me){
    var _slug=slugify(me.name);var _link=new URL('book.html?t='+encodeURIComponent(_slug),location.href).href;
    h+='<div class="sec"><div class="sech"><h2>Your public booking link</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-size:13px;color:var(--ink2);margin-bottom:10px">Share with clients &amp; recruits — they book you directly, no login.</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><input id="pubLink" readonly value="'+esc(_link)+'" style="flex:1;min-width:200px;padding:10px 12px;border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--ink);font-size:12.5px"><button style="border:none;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="copyLink()">Copy</button><a href="'+esc(_link)+'" target="_blank" rel="noopener" style="padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;border:1px solid var(--line2);background:var(--panel);color:var(--accent)">Preview</a></div></div></div>';
    h+=availabilityHtml(me);
  } else { h+='<div class="sec"><div class="sech"><h2>Availability</h2></div><div class="empty">You’re not set up to take bookings yet. Ask an admin to enable your calendar and your availability controls appear here.</div></div>'; }
  $('profBody').innerHTML=h;
  loadCalSyncStatus();
}
function availabilityHtml(me){
  var role=(me.role||'').toUpperCase();
  var canLock=role==='MD'||role==='EMD';
  var slots=me.slots||{};
  var blackouts=Array.isArray(me.blackouts)?me.blackouts:[];
  var vacations=Array.isArray(me.vacations)?me.vacations:[];
  var lockouts=Array.isArray(me.lockouts)?me.lockouts:[];
  var bBefore=Number(me.buffer_before)||0;
  var bAfter=Number(me.buffer_after)||0;
  var locked=!!me.locked;

  var _SELST="padding:8px 10px;border:1px solid var(--line2);border-radius:9px;background:var(--panel);color:var(--ink);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer";
  var slotsHtml=DAYS.map(function(d){var sel=slots[d]||[];var on=sel.length>0;
    var mins=sel.map(function(x){return t2min(x);});
    var startMin=on&&mins.length?Math.min.apply(null,mins):540;
    var endMin=on&&mins.length?(Math.max.apply(null,mins)+30):1020;
    return '<div class="avrow" data-day="'+d+'" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 0;border-bottom:1px solid var(--line)">'
      +'<div style="width:42px;font-weight:800;font-size:13px">'+d+'</div>'
      +'<select class="avsel" data-k="on" onchange="avRowToggle(this)" style="'+_SELST+'"><option value="1"'+(on?' selected':'')+'>Available</option><option value="0"'+(on?'':' selected')+'>Off</option></select>'
      +'<select class="avsel" data-k="start" style="'+_SELST+'"'+(on?'':' disabled')+'>'+timeOpts(360,1230,startMin)+'</select>'
      +'<span style="color:var(--ink3);font-size:12.5px">to</span>'
      +'<select class="avsel" data-k="end" style="'+_SELST+'"'+(on?'':' disabled')+'>'+timeOpts(390,1260,endMin)+'</select>'
      +'</div>';}).join('');

  var blackoutTags=blackouts.length?blackouts.map(function(d){return '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--gold-soft);color:var(--gold);padding:6px 10px;border-radius:8px;font-size:12.5px;font-weight:600;margin:0 6px 6px 0">'+esc(d)+' <a onclick="removeBlackout(\''+esc(d)+'\')" style="cursor:pointer;color:var(--red);font-weight:800">✕</a></span>';}).join(''):'<span style="color:var(--ink3);font-size:13px">None.</span>';

  var vacationList=vacations.length?vacations.map(function(v,i){return '<div class="apt" style="padding:10px 14px;margin-bottom:8px"><span style="font-weight:600">'+esc(v.start)+' → '+esc(v.end)+'</span><button class="x can" style="margin-left:auto" onclick="removeVacation('+i+')">Remove</button></div>';}).join(''):'<div class="empty" style="padding:10px">No vacations scheduled.</div>';

  var lockHtml='';
  if(canLock){
    var lockoutList=lockouts.length?lockouts.map(function(l,i){return '<div class="apt" style="padding:10px 14px;margin-bottom:8px"><span style="font-weight:600">'+esc(l.start)+' → '+esc(l.end)+'</span><button class="x can" style="margin-left:auto" onclick="removeLockout('+i+')">Remove</button></div>';}).join(''):'<div class="empty" style="padding:10px">No date-range lockouts.</div>';
    lockHtml='<div class="sec"><div class="sech"><h2>Calendar Lock ('+esc(role)+' only)</h2></div>'+
      '<div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;gap:14px"><div><div style="font-weight:700;font-size:14.5px">Manual booking only</div><div style="font-size:12.5px;color:var(--ink3);margin-top:3px">When ON, agents cannot self-book you. They must contact you directly.</div></div><button style="border:none;padding:10px 18px;border-radius:12px;font-weight:800;font-size:13.5px;cursor:pointer;background:'+(locked?'var(--red)':'var(--accent)')+';color:#fff" onclick="toggleLock()">'+(locked?'Locked — turn off':'Unlocked — turn on')+'</button></div></div>'+
      '<div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-weight:700;font-size:14.5px;margin-bottom:6px">Date-range lockouts</div><div style="font-size:12.5px;color:var(--ink3);margin-bottom:12px">Close your calendar for specific ranges (e.g. company off-site, out of country).</div>'+lockoutList+
      '<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap"><input type="date" id="lockStart" style="padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px"><span style="color:var(--ink3)">to</span><input type="date" id="lockEnd" style="padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px"><button style="border:none;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="addLockout()">Add lockout</button></div>'+
      '</div></div>';
  }

  var _off=offsetVsPT();var _tzn=(_off===0)?'You’re on Pacific Time.':('You’re in '+esc(viewerTz().split("/").pop().replace(/_/g,' '))+' ('+(_off>0?'+':'')+_off+'h vs Pacific) — e.g. 09:00 PT = '+ptToLocalLabel(9)+' your time.');
  var h='<div class="sec"><div class="sech"><h2>Weekly Availability</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-size:12.5px;color:var(--ink3);margin-bottom:4px">Set your available window for each day (<b>Pacific Time</b>). Pick a start and end — half-hour slots are supported. Choose <b>Off</b> for days you don’t take bookings.</div><div style="font-size:11.5px;color:var(--accent);font-weight:600;margin-bottom:12px">'+_tzn+'</div>'+slotsHtml+'<button style="border:none;margin-top:8px;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="saveSlots()">Save availability</button></div></div>';
  h+='<div class="sec"><div class="sech"><h2>Blackout Dates</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-size:13px;color:var(--ink2);margin-bottom:10px">Specific days when you cannot take bookings.</div><div style="display:flex;flex-wrap:wrap;margin-bottom:12px">'+blackoutTags+'</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><input type="date" id="newBlackout" style="padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px"><button style="border:none;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="addBlackout()">Add blackout date</button></div></div></div>';
  h+='<div class="sec"><div class="sech"><h2>Vacations</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-size:13px;color:var(--ink2);margin-bottom:10px">Date ranges when you\'re away.</div>'+vacationList+'<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap"><input type="date" id="vacStart" style="padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px"><span style="color:var(--ink3)">to</span><input type="date" id="vacEnd" style="padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px"><button style="border:none;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="addVacation()">Add vacation</button></div></div></div>';
  h+='<div class="sec"><div class="sech"><h2>Buffer Times</h2></div><div style="padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)"><div style="font-size:13px;color:var(--ink2);margin-bottom:10px">Minutes to leave clear before and after each booking.</div><div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap"><label style="font-size:13.5px;color:var(--ink2)">Before: <input id="bBefore" type="number" min="0" max="120" value="'+bBefore+'" style="width:70px;padding:7px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px;margin:0 6px"> min</label><label style="font-size:13.5px;color:var(--ink2)">After: <input id="bAfter" type="number" min="0" max="120" value="'+bAfter+'" style="width:70px;padding:7px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px;margin:0 6px"> min</label><button style="border:none;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;background:var(--accent);color:#fff;cursor:pointer" onclick="saveBuffers()">Save buffers</button></div></div></div>';
  h+=lockHtml;
  return h;
}
function availPost(payload,successMsg){
  var me=myTrainerProfile();if(!me)return toast('Trainer profile not loaded');
  payload.action='atlas_avail_update';payload.trainer_name=me.name;payload.code=CODE;
  fetch(AT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(r){
    if(!r||!r.ok){toast((r&&r.error)||'Save failed');return;}
    var idx=TRAINERS.findIndex(function(c){return c.name===me.name;});
    if(idx>=0&&r.cft){for(var k in r.cft)TRAINERS[idx][k]=r.cft[k];}
    toast(successMsg||'Saved');renderAvail();
  }).catch(function(){toast('Network error');});
}
function addBlackout(){var d=$('newBlackout').value;if(!d)return toast('Pick a date');var me=myTrainerProfile();if(!me)return;var arr=(me.blackouts||[]).slice();if(arr.indexOf(d)<0)arr.push(d);availPost({blackouts:arr},'Blackout added');}
function removeBlackout(d){var me=myTrainerProfile();if(!me)return;var arr=(me.blackouts||[]).filter(function(x){return x!==d;});availPost({blackouts:arr},'Blackout removed');}
function addVacation(){var s=$('vacStart').value,e=$('vacEnd').value;if(!s||!e)return toast('Pick both start and end');if(s>e)return toast('End must be on/after start');var me=myTrainerProfile();if(!me)return;var arr=(me.vacations||[]).slice();arr.push({start:s,end:e});availPost({vacations:arr},'Vacation added');}
function removeVacation(i){var me=myTrainerProfile();if(!me)return;var arr=(me.vacations||[]).slice();arr.splice(i,1);availPost({vacations:arr},'Vacation removed');}
function saveBuffers(){var b=Math.max(0,Number($('bBefore').value)||0),a=Math.max(0,Number($('bAfter').value)||0);availPost({buffer_before:b,buffer_after:a},'Buffers saved');}
function lockPost(payload,successMsg){
  var me=myTrainerProfile();if(!me)return toast('Trainer profile not loaded');
  payload.action='atlas_lock';payload.trainer_name=me.name;payload.code=CODE;
  fetch(AT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(r){
    if(!r||!r.ok){toast((r&&r.error)||'Lock failed');return;}
    var idx=TRAINERS.findIndex(function(c){return c.name===me.name;});
    if(idx>=0){TRAINERS[idx].locked=!!r.locked;TRAINERS[idx].lockouts=r.lockouts||[];}
    toast(successMsg||'Saved');renderAvail();
  }).catch(function(){toast('Network error');});
}
function toggleLock(){lockPost({action_type:'toggle'},'Calendar lock toggled');}
function addLockout(){var s=$('lockStart').value,e=$('lockEnd').value;if(!s||!e)return toast('Pick both start and end');if(s>e)return toast('End must be on/after start');lockPost({action_type:'add_lockout',start:s,end:e},'Lockout added');}
function removeLockout(i){var me=myTrainerProfile();if(!me||!me.lockouts||!me.lockouts[i])return;var l=me.lockouts[i];lockPost({action_type:'remove_lockout',start:l.start,end:l.end},'Lockout removed');}

var SPOTSEL=0,SPOTITEMS=[];
function openSpot(){$('spot').classList.add('on');$('spotI').value='';$('spotI').focus();spotSearch();}
function closeSpot(){$('spot').classList.remove('on');}
$('spot').addEventListener('click',function(e){if(e.target===this)closeSpot();});
function spotSearch(){var q=($('spotI').value||'').toLowerCase();var items=[];
  bTr().forEach(function(c){if(!q||c.name.toLowerCase().indexOf(q)>=0||(roleLabel(c.role).toLowerCase().indexOf(q)>=0)){items.push({t:c.name,s:roleLabel(c.role),k:'Trainer',act:function(){closeSpot();startBookWith(encodeURIComponent(c.name));}});}});
  MYB.forEach(function(b){var hay=((b.trainer_name||'')+' '+(b.category||'')+' '+(b.conf||'')+' '+(b.status||'')).toLowerCase();if(!q||hay.indexOf(q)>=0){items.push({t:b.trainer_name+' · '+(b.category||'Training'),s:prettyDate(b.date)+' · '+b.time+' · '+(b.conf||''),k:'Appt',act:function(){closeSpot();setTab('me');}});}});
  TRAININGS.forEach(function(s){if(!q||s.t.toLowerCase().indexOf(q)>=0||s.host.toLowerCase().indexOf(q)>=0){items.push({t:s.t,s:fmtHM(s.h,s.m)+' PT · '+s.host,k:'Training',act:function(){window.open(s.z,'_blank');}});}});
  CATS.forEach(function(c){if(q&&c.toLowerCase().indexOf(q)>=0)items.push({t:c,s:'Start a booking',k:'Type',act:function(){closeSpot();SELCAT=c;setTab('book');}});});
  SPOTITEMS=items.slice(0,12);SPOTSEL=0;
  $('spotR').innerHTML=SPOTITEMS.length?SPOTITEMS.map(function(x,i){return '<div class="sres'+(i===0?' sel':'')+'" onclick="SPOTITEMS['+i+'].act()"><div class="si">'+esc((x.k[0]||'?'))+'</div><div><div class="st">'+esc(x.t)+'</div><div class="ss">'+esc(x.s)+'</div></div><span class="kind">'+esc(x.k)+'</span></div>';}).join(''):'<div class="empty" style="border:none">No matches.</div>';}
function spotKey(e){if(e.key==='ArrowDown'){e.preventDefault();SPOTSEL=Math.min(SPOTITEMS.length-1,SPOTSEL+1);spotHi();}else if(e.key==='ArrowUp'){e.preventDefault();SPOTSEL=Math.max(0,SPOTSEL-1);spotHi();}else if(e.key==='Enter'){if(SPOTITEMS[SPOTSEL])SPOTITEMS[SPOTSEL].act();}}
function spotHi(){[].forEach.call($('spotR').children,function(el,i){el.classList.toggle('sel',i===SPOTSEL);});}
</script>
